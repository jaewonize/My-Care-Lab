<!DOCTYPE html>

<title>Slow Museum — Gallery</title>
<script>
/* iframe(부모 대시보드)에 임베드되면 스스로 임베드 레이아웃 적용 — file:// 더블클릭에서도 동작 */
if (window.self !== window.top) {
  var s = document.createElement('style');
  s.textContent =
    "html,body{background:transparent!important;margin:0!important;padding:0!important;overflow:hidden!important;}"+
    "body{display:block!important;}"+
    "main{display:block!important;transform:none!important;padding:0!important;margin:0!important;}"+
    "#canvas-wrap{position:absolute!important;top:0!important;left:0!important;margin:0!important;border-radius:0!important;box-shadow:none!important;transform:none!important;}"+
    "#sliders,.control-panel,#control-panel,#controls,aside,.sliders,.panel-right{display:none!important;}"+
    "#cards,.cards,.score-cards,.card-row{display:none!important;}"+
    "#phone-title{top:66px!important;left:24px!important;}"+
    "#phone-title .pt-eyebrow{display:block!important;}";
  document.documentElement.appendChild(s);
}
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}
body {
  background: #e9ded0;
  display: flex; flex-direction: column;
  min-height: 100vh;
  padding: 24px 32px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  line-height: 1.3;
}
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translateY(-20px);
}
#phone-title {
  position: absolute;
  top: 60px;
  left: 24px;
  z-index: 3;
  pointer-events: none;
}
#phone-title .pt-eyebrow {
  display: block;
  font-family: "Noto Sans KR", system-ui, sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #d5ccc0;
  letter-spacing: -0.2px;
  line-height: 1;
}
#phone-title .pt-name {
  display: block;
  font-family: "Roboto", "Noto Sans KR", system-ui, sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: #675d56;
  letter-spacing: -0.8px;
  line-height: 1;
  margin-top: 3px;
}
#canvas-wrap {
  width: 360px; height: 780px;
  background: #ffffff;
  border-radius: 40px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  touch-action: none;
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}
canvas { display:block; cursor:grab; touch-action: none; }
canvas:active { cursor:grabbing; }

#cards {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 268px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 16px 24px 28px;
  background: transparent;
  z-index: 2;
  pointer-events: none;
}
.card {
  background: #f5efe8;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card .name { font-size: 13px; color: #666; font-weight: 600; }
.card .score { font-size: 26px; color: #7d7169; font-weight: 700; line-height: 1.1; }

/* 단독 감상 작품 해설(미술관 캡션) — 조각=위, 그림=아래 여백 */
#art-label {
  position: absolute;
  left: 28px; right: 28px;
  text-align: center;
  z-index: 3;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s ease;
  color: #5f564f;
}
#art-label.show { opacity: 1; }
#art-label .al-title {
  font-size: 19px; font-weight: 700; color: #4f473f;
  letter-spacing: -0.01em; margin-bottom: 7px;
}
#art-label .al-meta {
  font-size: 12px; font-weight: 500; line-height: 1.6; color: #8a7f74;
}

#sliders {
  width: 360px;
  height: 780px;
  background: #ffffff;
  border-radius: 0 40px 40px 0;
  padding: 90px 28px 28px 56px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 24px;
  margin-left: -32px;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
#sliders h2 {
  font-size: 16px;
  color: #888;
  font-weight: 500;
  margin-top: 5px;
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}
.slider-row { display: flex; flex-direction: column; gap: 9px; }
.slider-row .label-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 15px; color: #7d7169;
}
.slider-row .label { font-weight: 600; color: #7d7169; }
.slider-row .value { font-variant-numeric: tabular-nums; color: #7d7169; font-size: 14px; font-weight: 600; }
.slider-row input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 8px; border-radius: 4px;
  background: #e0e0e0; outline: none;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: #7d7169; cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.slider-row input[type="range"]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%;
  background: #7d7169; cursor: pointer; border: none;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

#submit-btn {
  margin-top: 2px;
  padding: 10px 32px;
  border-radius: 999px;
  background: #7d7169;
  color: #ffffff;
  font-size: 16px;
  font-weight: 700;
  line-height: 1.2;
  border: none;
  cursor: pointer;
  align-self: center;
  box-shadow: 0 4px 12px rgba(125, 113, 105, 0.4);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  letter-spacing: 0.02em;
  font-family: inherit;
}
#submit-btn:hover { box-shadow: 0 6px 16px rgba(125, 113, 105, 0.5); }
#submit-btn:active { transform: scale(0.97); }

#triggers {
  margin-top: -2px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#triggers h3 {
  font-size: 16px;
  color: #888;
  font-weight: 500;
  letter-spacing: 0.02em;
}
#trigger-buttons {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
}
.trigger-btn {
  padding: 5px 14px;
  border-radius: 999px;
  background: transparent;
  color: #7d7169;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.2;
  border: 1px solid #7d7169;
  cursor: pointer;
  transition: background 0.1s ease;
  white-space: nowrap;
  font-family: inherit;
}
.trigger-btn:hover { background: rgba(125, 113, 105, 0.12); }
.trigger-btn:active { transform: scale(0.97); }
.trigger-row { display: flex; gap: 10px; align-items: center; }
</style>

<body>
<main>
<div id="canvas-wrap">
  <div id="phone-title"><span class="pt-eyebrow">소연님의</span><span class="pt-name">Slow Museum</span></div>
  <canvas id="gallery" width="360" height="780"></canvas>
  <div id="art-label">
    <div class="al-title"></div>
    <div class="al-meta"></div>
  </div>
</div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/meshoptimizer@0.20.0/meshopt_decoder.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/BokehShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/BokehPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/GammaCorrectionShader.js"></script>
<script>
const W = 360, H = 780;
const canvas = document.getElementById('gallery');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbcb6a9);

// ─── 갤러리 실내 치수 ───
const ROOM_W = 8;          // x: -4 .. 4
const ROOM_H = 4.6;        // y: 0 .. 4.6
const BACK_Z  = -10;       // 안쪽 벽 (중앙 벽체)
const FRONT_Z = 6;         // 입구 쪽
const ROOM_D  = FRONT_Z - BACK_Z;
const HALF_W  = ROOM_W / 2;
const MID_Z   = (BACK_Z + FRONT_Z) / 2;

// ─── 표면 재질 ───
// 정면벽(feature)은 따뜻하고 밝게, 양옆 벽은 한 단계 어둡고 차갑게 →
// 동일 재질일 때 안 보이던 오목 코너가 값(value) 경계로 항상 읽힘.
const backWallMat = new THREE.MeshStandardMaterial({ color: 0xf9f5ef, roughness: 0.96, metalness: 0 }); // 가운데 벽: 가장 밝게
const sideWallMat = new THREE.MeshStandardMaterial({ color: 0xdbd5c6, roughness: 0.96, metalness: 0 });
const leftWallMat = new THREE.MeshStandardMaterial({ color: 0xf0ebdf, roughness: 0.96, metalness: 0 }); // 왼쪽 벽: 중간 톤(아주 살짝 밝게)
const floorMat = new THREE.MeshStandardMaterial({ color: 0xc9bca2, roughness: 0.65, metalness: 0.05 });
const ceilMat  = new THREE.MeshStandardMaterial({ color: 0xfbf9f3, roughness: 1.0,  metalness: 0 });

// ─── 바닥 / 천장 ───
const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_D), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, 0, MID_Z);
floor.receiveShadow = true;
scene.add(floor);

const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_D), ceilMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.set(0, ROOM_H, MID_Z);
scene.add(ceiling);

// ─── 벽체 (존 매핑) ───
// 중앙 벽체(안쪽) — 잘 가꾸기 / 초상화
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), backWallMat);
backWall.position.set(0, ROOM_H / 2, BACK_Z);
backWall.receiveShadow = true;
scene.add(backWall);

// 왼쪽 벽체 — 잘 쉬기 / 풍경화
const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_D, ROOM_H), leftWallMat);
leftWall.rotation.y = Math.PI / 2;
leftWall.position.set(-HALF_W, ROOM_H / 2, MID_Z);
leftWall.receiveShadow = true;
scene.add(leftWall);

// 오른쪽 벽체 — 잘 다스리기 / 추상화
const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_D, ROOM_H), sideWallMat);
rightWall.rotation.y = -Math.PI / 2;
rightWall.position.set(HALF_W, ROOM_H / 2, MID_Z);
rightWall.receiveShadow = true;
scene.add(rightWall);


// ─── 플레이스홀더: 액자 (다음 단계에서 실제 작품 텍스처로 교체) ───
function makeFrame(w, h) {
  const g = new THREE.Group();
  const frame = new THREE.Mesh(
    new THREE.BoxGeometry(w + 0.16, h + 0.16, 0.07),
    new THREE.MeshStandardMaterial({ color: 0x262420, roughness: 0.55 })
  );
  const art = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshStandardMaterial({ color: 0xe5dfd1, roughness: 1.0 })
  );
  art.position.z = 0.045;
  // 벽 부착 액자는 그림자 끔: 태양광이 벽을 스칠 때 생기는 딱딱한 사각 그림자 방지.
  frame.castShadow = false;
  g.add(frame); g.add(art);
  g.userData.art = art;
  g.userData.frame = frame;
  return g;
}

// ─── 플레이스홀더: 조각 전시대 (다음 단계에서 실제 조각 모델로 교체) ───
// PED_H = 기준 전시대 높이. 향후 불러올 조각 모델에 따라 전시대 높이를
// 4종류로 매핑 예정: 얕은/중간/높은 + 전시대 없이 바닥에 놓는 타입(h=0).
const PED_H = 0.6;

// 접지 그림자(contact shadow) 텍스처 — 중심 진하고 가장자리 투명한 radial,
// 조명과 무관하게 항상 전시대가 바닥에 닿아 보이게 함. (전 전시대 공유)
const _contactShadowTex = (function () {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(64, 64, 4, 64, 64, 64);
  g.addColorStop(0, 'rgba(0,0,0,0.55)');
  g.addColorStop(0.5, 'rgba(0,0,0,0.24)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  x.fillStyle = g; x.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
})();

function makePedestal(h, wx = 1, wz = 1) {      // wx=가로(X)·wz=깊이(Z) 폭 배율 (조각 무왜곡)
  const g = new THREE.Group();
  let topY = 0;
  // [불변식] X: 로컬 x=0 → 전시대/그림자 중심은 항상 슬롯 기본 X(좌우 대칭·중심 정렬,
  //  wx 변경 시 중심 기준 균등 확장). Z: 앞면(+Z) 라인 고정, wz 증가는 뒤로만.
  const D = 0.8 * wz;                            // 깊이는 앞면(+Z) 고정, 뒤(-Z)로만 확장
  const zc = 0.4 - D / 2;                        // 앞면 로컬 +0.4 고정 (wz=1 → zc=0, 기존 동일)
  if (h > 0) {                                   // 전시대 base (h=0이면 생략 → 바닥에 직접)
    const base = new THREE.Mesh(
      new THREE.BoxGeometry(0.8 * wx, h, D),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.85 })
    );
    base.position.set(0, h / 2, zc);
    base.castShadow = true; base.receiveShadow = true;
    g.add(base);
    topY = h;
  }
  // 바닥 접점 그림자: 전시대 유무와 무관하게 항상 (h0=바닥 직접 세움도 접지 그림자)
  const shadow = new THREE.Mesh(
    new THREE.PlaneGeometry(1.5 * wx, 1.5 * wz),
    new THREE.MeshBasicMaterial({ map: _contactShadowTex, transparent: true, depthWrite: false })
  );
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.z = zc;          // 베이스 중심과 정렬
  shadow.position.y = 0.012;       // 바닥 살짝 위 (z-fighting 방지)
  shadow.renderOrder = 1;          // 바닥 위에 덧그리기
  shadow.userData.noPick = true;   // 클릭 레이캐스트 제외 (바닥 클릭=복귀 보존)
  g.add(shadow);
  g.userData.topY = topY;   // 조각이 놓일 전시대 윗면 높이 (없으면 0=바닥)
  return g;
}

// ─── 4개 존 그룹 ───
const zones = {
  move:   { group: new THREE.Group(), items: [], spot: null },  // 중앙홀 — 조각
  rest:   { group: new THREE.Group(), items: [], spot: null },  // 왼쪽 벽체 — 풍경화
  groom:  { group: new THREE.Group(), items: [], spot: null },  // 중앙 벽체 — 초상화
  manage: { group: new THREE.Group(), items: [], spot: null },  // 오른쪽 벽체 — 추상화
};
Object.values(zones).forEach(z => scene.add(z.group));

// 중앙홀 — 조각 전시대 5곳: 앞열 3(#1,#2,#3) + 뒷열 2(#4,#5).
// 위치=`PED_POS`(고정), 전시대 높이/폭=모델별(`SCULPT_PED_H/WX/WZ`, 페어링 불변식),
// 턴별 배정=`PED_ASSIGN`(#2는 `PED_FIXED` thrower 고정).
// ─── 전시 5턴(알파벳순 4개씩). 전시대 #2(앞열-중)는 항상 비움. CLAUDE.md "전시 최적화 5턴 작업" ───
const TURN = 5;                                   // 현재 전시 턴 (1..5) — 그림/조각 공통
const SCULPT_H = 1.7;                             // 조각 목표 높이(월드) — 균일 정규화
// 모델별 보정: scale=균일높이 대비 배율, ry=Y회전, ox=X오프셋, oy=Y오프셋(−=아래),
//   oz=Z오프셋(+=앞/관람자 쪽, 월드단위), bright=자기발광
const SCULPT_ADJ = {
  thrower:     { scale: 0.9,  ry: Math.PI / 4 },
  nike:        { scale: 0.9,  ry: 0 },
  brancusi:    { scale: 0.66, ry: 0 },
  thinker:     { scale: 0.88, ry: Math.PI / 6, bright: 0.9, ox: 0.0 },
  balloon_dog: { scale: 0.81, ry: Math.PI / 4 + Math.PI / 18, ox: 0.2 },  // 55° · 0.9×0.9 · 우로 0.2
  ballerina:   { scale: 1,    ry: 0, bright: 0.9 },               // 너무 어두워 자기발광 보정
  abstract:    { scale: 1,    ry: -Math.PI / 2 + Math.PI / 4 },   // Y −90°+45° = −45°
  bust:        { scale: 0.792, ry: 0 },                           // 0.72×1.1 (전시대=brancusi와 동일)
  carol_gold:  { scale: 1.17,  ry: 0, ox: 0.075 },                // 1.3×0.9·우로 0.075
  colossus:    { scale: 1.0935, ry: 0 },                          // 1.215×0.9 (전시대 h0.3)
  henry_moor:  { scale: 0.72,  ry: Math.PI / 2, ox: 0.08 },       // 0.8×0.9·Y90°·우로 0.08(전시대=thinker)
  ionia:       { scale: 0.855, ry: 0 },                           // 0.9×0.95 (T3)
  mauryan:     { scale: 1.1,   ry: 0 },                           // 1.1배 (T3)
  listening:   { scale: 1,     ry: 0, oy: -0.79, oz: 0.4 },       // 앉은 자세: 아래 −0.79·앞 +0.4(전시대 걸침)
  tulip:       { scale: 0.8,   ry: 0, ox: 0.2 },                  // 0.8배·우로 0.2 (T4 차용)
  song:        { scale: 1.1,   ry: 0, oz: 0.2 },                  // 1.1배·앞 +0.2 (T4)
  walker:      { scale: 0.88,  ry: 0 },                           // 1.1×0.8 (T5, 전시대 h0.6)
  zeus:        { scale: 0.72,  ry: 0, ox: -0.02 },                // 0.9×0.8·좌 0.02 (T5, 전시대 h0.6)
};
// 모델별 전시대 높이(검증값). 미지정 신규 = PED_DEFAULT_H → 검토 후 여기에 확정 누적
const SCULPT_PED_H = { milo: 0.3, thrower: 0.3, nike: 0.3, thinker: 0.6, brancusi: 1.0,
  bust: 1.0,          // brancusi와 동일 전시대
  henry_moor: 0.6,    // thinker와 동일 전시대
  carol_gold: 0.15,   // 낮은 전시대(0.15) 위에
  colossus: 0.3,      // 전시대(0.3) 위에

// 벽별 균일 간격: 첫·마지막 프레임 센터(p0·p3) 유지 → 전체 폭 보존,
// 가운데 둘(p1·p2)을 모서리간 균일 간격 G로 재배치 (G = (innerSpace - w1 - w2)/3).
const _zoneAxis = { groom: 'x', manage: 'z', rest: 'z' };
const _loaded = { groom: 0, manage: 0, rest: 0 };
function layoutWallUniform(zk) {
  const ax = _zoneAxis[zk]; const items = zones[zk].items;
  if (items.length < 4) return;
  const w = items.map(it => it.userData._outerW || 0);
  if (w.some(x => x <= 0)) return;
  const p0 = items[0].position[ax], p3 = items[3].position[ax];
  const dir = Math.sign(p3 - p0) || 1;
  const D = Math.abs(p3 - p0);
  const G = (D - w[0] / 2 - w[3] / 2 - w[1] - w[2]) / 3;   // 내부 모서리간 균일 간격
  items[1].position[ax] = p0 + dir * (w[0] / 2 + G + w[1] / 2);
  items[2].position[ax] = items[1].position[ax] + dir * (w[1] / 2 + G + w[2] / 2);
}

function _applyPaintingTex(f, zk, name, tex, fadeIn) {

function _placeSculpture(ped, gltf, fadeIn) {
    const name = ped.userData._sculpt;
    const adj = SCULPT_ADJ[name] || { scale: 1, ry: 0 };
    const m = gltf.scene;
    m.rotation.y = adj.ry;                      // 회전 먼저 적용 (정렬 전)
    m.updateMatrixWorld(true);
    _sbox.setFromObject(m); _sbox.getSize(_ssz); _sbox.getCenter(_sctr);
    const s = (SCULPT_H / _ssz.y) * adj.scale;  // 높이 기준 균일 스케일 × 모델별 배율
    m.scale.setScalar(s);
    // 바닥면을 전시대 윗면에, x·z 중심을 전시대 중심에 정렬
    m.position.set(-_sctr.x * s + (adj.ox || 0), ped.userData.topY - _sbox.min.y * s + (adj.oy || 0), -_sctr.z * s + (adj.oz || 0));
    m.traverse(o => {
      if (o.isMesh) {
        o.castShadow = true; o.receiveShadow = true;
        o.userData._owner = ped.userData.focusable;  // 클릭/포커스 대상으로 등록

            if (mt.map) { mt.emissiveMap = mt.map; mt.emissive.setRGB(1, 1, 1); }
            else mt.emissive.copy(mt.color);
            mt.emissiveIntensity = adj.bright;
            mt.needsUpdate = true;

function setSoloIsolation(on, keep) {

  const target = _bc.clone();
  if (!isFrame) target.y = _box.min.y + oh * SOLO_SCULPT_VBIAS;

// ─── 입력: 1포인터 회전(드래그와 같은 방향) · 2포인터 핀치줌 · 휠줌 · 클릭 ───
const _ray = new THREE.Raycaster();
const _ndc = new THREE.Vector2();
const pointers = new Map();               // pointerId → {x,y}
let downX = 0, downY = 0, moved = 0;
let pinching = false, pinchUsed = false, pinchD0 = 0, pinchF0 = 0;
const CLICK_SLOP = 6;

function pickFocusable(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  _ndc.x = ((clientX - r.left) / r.width) * 2 - 1;
  _ndc.y = -((clientY - r.top) / r.height) * 2 + 1;
  _ray.setFromCamera(_ndc, camera);
  const hits = _ray.intersectObjects(_raycastMeshes, false);
  for (const h of hits) {
    const o = h.object.userData._owner;
    // 레이캐스터는 invisible도 맞히므로, 격리되어 숨겨진 작품은 건너뜀
    if (o && o.group.visible) return o;
  }
  return null;
}
function applyZoom(fov) {
  freeFov = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, fov));
  camera.fov = freeFov;
  camera.updateProjectionMatrix();        // 렌즈 시프트(setViewOffset) 자동 유지
}
function pinchDist() {
  const p = [...pointers.values()];
  return Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
}

canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('pointerdown', e => {
  if (mode === 'transition') return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  canvas.setPointerCapture(e.pointerId);
  if (pointers.size === 1) {
    downX = e.clientX; downY = e.clientY; moved = 0; pinching = false; pinchUsed = false;
  } else if (pointers.size === 2) {
    pinching = true; pinchUsed = true; pinchD0 = pinchDist(); pinchF0 = freeFov;
  }
});
window.addEventListener('pointermove', e => {
  const p = pointers.get(e.pointerId);
  if (!p) return;
  const dx = e.clientX - p.x, dy = e.clientY - p.y;
  p.x = e.clientX; p.y = e.clientY;

  if (pinching && pointers.size >= 2) {
    if (mode === 'free') applyZoom(pinchF0 * pinchD0 / Math.max(1, pinchDist()));
    return;
  }
  if (pointers.size === 1) {
    moved += Math.abs(dx) + Math.abs(dy);
    if (mode === 'free') {
      // 잡고 끄는 느낌: 드래그 방향과 같은 방향으로 벽이 움직임 (좌우만, 수직 패닝 없음).
      yaw = Math.max(-YAW_LIMIT, Math.min(YAW_LIMIT, yaw + dx * 0.0035));
      applyCam();
    } else if (mode === 'overview') {
      // 아이소메트릭 턴테이블: 드래그로 미술관을 좌우로 돌림 (방위각, 고도 고정).
      OVERVIEW.az -= dx * 0.005;
      applyOverviewCam();
    } else if (mode === 'focus' && focusGroup) {
      // 단독 턴테이블: 드래그로 카메라가 작품 주위를 돎 (작품 자체는 안 움직임).
      soloAngle -= dx * 0.01;
      applySoloOrbit();
    }
  }
});
function endPointer(e) {
  if (!pointers.has(e.pointerId)) return;
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinching = false;
  if (pointers.size > 0) return;            // 아직 손가락 남아있음
  if (mode === 'transition') return;
  if (moved <= CLICK_SLOP && !pinchUsed) {  // 드래그/핀치가 아니라 클릭
    const cx = e.clientX === undefined ? downX : e.clientX;
    const cy = e.clientY === undefined ? downY : e.clientY;
    const hit = pickFocusable(cx, cy);
    if (hit && !(mode === 'focus' && hit.group === focusGroup)) {
      focusOn(hit);                         // 작품/조각 클릭 → 단독 감상 (다른 작품이면 전환)
    } else if (!hit) {
      returnToInit();                       // 빈 배경/허공 클릭 → 초기 앵글 (focus 중 같은 작품 재클릭은 무시)
    }
  }
  pinchUsed = false;
}
window.addEventListener('pointerup', endPointer);
window.addEventListener('pointercancel', endPointer);

// 휠 줌 (스크롤 업 = 줌인)
canvas.addEventListener('wheel', e => {
  if (mode === 'transition' || mode === 'focus') return;
  e.preventDefault();
  if (mode === 'overview') {
    if (e.deltaY < 0) returnToInit();              // 오버뷰에서 줌인 → 초기 뷰 복귀
    return;
  }
  // mode === 'free'
  if (e.deltaY > 0 && freeFov >= ZOOM_MAX - 0.01) { // 줌아웃 한계 도달 → 전경 오버뷰
    enterOverview();
    return;
  }
  applyZoom(freeFov + e.deltaY * 0.025);
}, { passive: false });

// ─── 렌더 루프 ───
function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }
// ─── 피사계 심도(DOF): 초기 앵글에서 앞줄 조각 선명 / 원경 살짝 블러 ───
const _dpr = Math.min(window.devicePixelRatio, 2);
// EffectComposer는 자체 렌더타깃을 써서 renderer의 antialias(MSAA)가 우회됨
// → 조각 외곽선이 계단형으로 보임. WebGL2 멀티샘플 타깃을 넘겨 후처리 체인에도 MSAA 적용.
let _composerTarget;
if (renderer.capabilities.isWebGL2) {
  _composerTarget = new THREE.WebGLMultisampleRenderTarget(
    Math.floor(W * _dpr), Math.floor(H * _dpr),
    { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
      format: THREE.RGBAFormat, stencilBuffer: false }
  );
  _composerTarget.samples = 4;
}
const composer = new THREE.EffectComposer(renderer, _composerTarget);   // 멀티샘플 타깃(없으면 기본 동작)
composer.addPass(new THREE.RenderPass(scene, camera));
const bokeh = new THREE.BokehPass(scene, camera, {
  // 앞줄 조각(#1·#2·#3) 초점, 뒤로 갈수록 점진적 아웃포커스.
  // 심도를 깊게(원경 블러 완화): aperture/maxblur 낮춰 뒷줄·뒷벽이 덜 흐리게.
  focus: 8.0, aperture: 0.003, maxblur: 0.004,
  width: W * _dpr, height: H * _dpr,
});
// BokehPass 기본 needsSwap=false → 뒤에 패스가 오면 블러 결과가 버려짐.
// true로 바꿔야 다음(감마) 패스가 BokehPass의 블러 출력을 읽음.
bokeh.needsSwap = true;
composer.addPass(bokeh);
// 후처리 거치면 sRGB 출력 인코딩이 빠져 어두워짐 → 마지막에 감마보정으로 복원
composer.addPass(new THREE.ShaderPass(THREE.GammaCorrectionShader));
const _focusBox = new THREE.Box3(), _focusCtr = new THREE.Vector3();
function dofFocusDistance() {
  if (mode === 'focus') return camera.position.distanceTo(soloTarget);
  if (mode === 'overview') return camera.position.distanceTo(OVERVIEW.center);
  // free/transition: 앞줄 가운데 조각(#2)에 초점
  const ped = zones.move.items[1];
  if (ped && ped.children.length > 1) {
    _focusBox.setFromObject(ped); _focusBox.getCenter(_focusCtr);
    return camera.position.distanceTo(_focusCtr);
  }
  return 7.0;
}

let _last = performance.now();
let _paused = false;
window.__pauseRender = () => { _paused = true; };
window.__resumeRender = () => { if (_paused) { _paused = false; _last = performance.now(); animate(); } };
// ── 보상 등장 fade-in (런타임 추가 시에만) ──
const _fading = [];
function registerFade(root, dur = 0.8, delay = 0) {
  const mats = [];
  root.traverse(o => {
    if (o.isMesh) {
      const ms = Array.isArray(o.material) ? o.material : [o.material];
      ms.forEach(m => { if (m && m.opacity !== undefined) { m.transparent = true; m.opacity = 0; mats.push(m); } });
    }
  });
  if (mats.length) _fading.push({ mats, t: 0, dur, delay });
}
function updateFades(dt) {
  for (let i = _fading.length - 1; i >= 0; i--) {
    const f = _fading[i];
    f.t += dt;
    if (f.t < f.delay) { f.mats.forEach(m => { m.opacity = 0; }); continue; }  // 지연 동안 투명 유지
    const k = Math.min(1, (f.t - f.delay) / f.dur);
    const e = 1 - Math.pow(1 - k, 3);   // easeOutCubic
    f.mats.forEach(m => { m.opacity = e; });
    if (k >= 1) _fading.splice(i, 1);
  }
}

function animate() {
  if (_paused) return;   // 일시정지 시 RAF 체인 끊음 → CPU/GPU 부담 0
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - _last) / 1000, 0.05);
  _last = now;
  updateFades(dt);
  if (tween) {
    tween.t = Math.min(1, tween.t + dt / tween.dur);
    const e = easeInOut(tween.t);
    camera.position.lerpVectors(_p0, _p1, e);
    camera.quaternion.copy(_q0).slerp(_q1, e);
    camera.fov = tween.fov0 + (tween.fov1 - tween.fov0) * e;
    const off = tween.off0 + (tween.off1 - tween.off0) * e;
    if (off > 0.5) camera.setViewOffset(W, H, 0, off, W, H);
    else camera.clearViewOffset();
    camera.updateProjectionMatrix();
    if (tween.t >= 1) { const done = tween.onDone; tween = null; if (done) done(); }
  }
  // BokehShader: factor = focus + viewZ, viewZ≈-거리(음수) → focus는 양수 월드거리
  bokeh.uniforms['focus'].value = dofFocusDistance();
  composer.render();
  updateArtLabelPos();                              // 작품 바닥선 추종(트윈/회전 중에도)
}
animate();

// 슬라이더 UI 제거됨 — My Care Lab 부모 페이지가 점수 관리.
// 갤러리 조명은 기본값으로 한 번만 세팅. 부모가 점수 주입하려면 window.__scores 사용.
const scores = { move: 72, rest: 60, groom: 48, manage: 80 };
updateZoneLighting();

// ─── (dev) 디버그용 외부 노출 ───
window.__debug = {
  camera, scene, zones, sun, focusables,
  focusOn, returnToInit, composer, bokeh,
  state: () => ({ mode, focusedZone }),
};
window.__scores = scores;
</script>
<script>
/* ── 통합(WA_integration) 끼워진 모드 ──
   부모 통합 페이지가 ?embed=1 로 이 페이지를 iframe에 띄우면:
   · 자체 컨트롤 패널(#sliders)을 숨기고 폰 화면만 표시
   · 부모가 postMessage로 보내는 슬라이더/입력/트리거 값을
     기존 컨트롤(slider-*, submit-btn, .trigger-btn)에 그대로 주입
   기존 반응 로직은 손대지 않음 → 테마를 수정·배포하면 통합 화면에 자동 반영. */
(function () {
  if (new URLSearchParams(location.search).get('embed') !== '1') return;

  var css = document.createElement('style');
  css.textContent =
    'html,body{background:transparent !important;}' +
    'body{padding:0 !important;}' +
    'main{transform:none !important;}' +
    '#sliders{display:none !important;}' +
    '#canvas-wrap{box-shadow:none !important;border-radius:0 !important;background:transparent !important;transform:scale(1.012) !important;}';
  document.head.appendChild(css);

  function setSlider(key, value) {
    var s = document.getElementById('slider-' + key);
    if (!s) return;
    s.value = value;
    s.dispatchEvent(new Event('input', { bubbles: true }));
  }
  function clickTrigger(label) {
    var want = String(label).trim();
    var btns = document.querySelectorAll('.trigger-btn');
    for (var i = 0; i < btns.length; i++) {
      if (btns[i].textContent.trim() === want) { btns[i].click(); return; }
    }
  }

  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d || d.source !== 'wa-integration') return;
    if (d.type === 'slider') {
      setSlider(d.key, d.value);
    } else if (d.type === 'submit') {
      if (d.scores) {
        ['move', 'rest', 'groom', 'manage'].forEach(function (k) {
          if (d.scores[k] != null) setSlider(k, d.scores[k]);
        });
      }
      var btn = document.getElementById('submit-btn');
      if (btn) btn.click();
    } else if (d.type === 'trigger') {
      clickTrigger(d.label);
    }
  });

  function announce() {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ source: 'wa-theme', type: 'ready' }, '*');
    }
  }
  if (document.readyState === 'complete') announce();
  else window.addEventListener('load', announce);
})();

/* ─── My Care Lab 연동 API ─────────────────────────────────────────
   부모 페이지(index.html)가 미션 완료 시점에 호출.
   ─── addSculpture(slotIdx, name)
       slotIdx: 0..4 (#1..#5 전시대), name: 'thrower' | 'nike' | ...
   ─── addPainting()
       빈 액자가 있는 벽 중 우선 portrait(groom) → random other
       에서 빈 슬롯 하나 골라, 해당 벽 시퀀스의 미사용 그림 무작위 로드. */
window.gallery = {
  addSculpture(slotIdx, name) {
    const ped = zones.move.items[slotIdx];
    if (!ped || ped.userData._sculpt) return false;
    ped.userData._sculpt = name;
    _loadSculptureToPed(ped, true);   // fade-in
    return true;
  },
  addPainting(preferZone) {
    const pickZone = (zk) => {
      const empties = zones[zk] ? zones[zk].items.filter(f => f.userData._empty) : [];
      return empties.length ? empties[Math.floor(Math.random() * empties.length)] : null;
    };
    let zk = null, f = null;
    // 지정 벽이 있으면 거기서 먼저
    if (preferZone) { f = pickZone(preferZone); if (f) zk = preferZone; }
    // 없으면 portrait(groom) 우선, 그 다음 random
    if (!f) {
      f = pickZone('groom'); zk = 'groom';
      if (!f) {
        const others = ['rest', 'manage'].filter(k => zones[k].items.some(it => it.userData._empty));
        if (!others.length) return null;
        zk = others[Math.floor(Math.random() * others.length)];
        f = pickZone(zk);
      }
    }
    if (!f) return null;
    // 지정(프리로드된) 이미지 우선 사용 → 즉시 표시. 없으면 미사용 항목 무작위.
    let entry = f.userData._designatedEntry;
    if (!entry) {
      const z = EXHIBIT[zk];
      const shownEntries = new Set(zones[zk].items.map(it => it.userData._entry).filter(Boolean));
      const candidates = z.seq.filter(s => !shownEntries.has(s));
      if (!candidates.length) return null;
      entry = candidates[Math.floor(Math.random() * candidates.length)];
    }
    _loadPaintingToFrame(f, zk, entry, true);   // fade-in
    return { zone: zk, name: entry.replace(/!$/, '') };
  },
  getCounts() {
    return {
      sculptures: zones.move.items.filter(p => p.userData._sculpt).length,
      paintings: ['groom','rest','manage'].reduce((s,k)=>s+zones[k].items.filter(f=>!f.userData._empty).length, 0),
    };
  },
};
</script>
</body>
