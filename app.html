<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>My Care Lab</title>
<!-- PWA: 홈 화면에 추가 시 주소창/내비바 없이 풀스크린 실행 -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#000000" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="icon.svg" />
<script>/* 피칭 페이지 iframe 임베드 모드: ?embed=1 이면 폰만 좌상단에 노출 */
document.documentElement.classList.toggle('embed', location.search.indexOf('embed') > -1);</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --nav-bar-h:    40px;   /* 모바일 시스템(내비) 바 높이만큼 하단 UI를 위로 올림 (시스템바 표시 시 가려지지 않게) */
    --bg:           #e8eff1;
    --card:         #ffffff;
    --primary:      #1aa6c2;
    --primary-2:    #3fbfd8;
    --primary-soft: #d3edf3;
    --mint:         #2db58a;
    --gradient-key: linear-gradient(135deg, #6fd9b4 0%, #6cd4cc 50%, #6cb8e2 100%);
    --ink:          #142b34;
    --ink-2:        #4a626b;
    --ink-3:        #8aa0a8;
    --ink-4:        #c2d1d6;
    --hair:         #e8edef;
    --font:         "Roboto", "Noto Sans KR", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font);
    background: #000;
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
    display: grid;
    place-items: center;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .stage-label {
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    color: #6a7080;
    letter-spacing: -.1px;
  }
  /* 임베드 모드: 배경/여백 제거하고 폰만 좌상단 360×780으로 (피칭 iframe용) */
  html.embed, html.embed body { height: auto; }
  html.embed body { padding: 0; margin: 0; background: transparent; display: block; }
  html.embed .stage { gap: 0; align-items: center; }
  html.embed body { display: flex; align-items: center; justify-content: center; }
  html.embed .stage-label { display: none; }
  html.embed .phone { box-shadow: none; }
  /* 단독 실행(모바일): 폰을 화면에 꽉 차게 — 라운딩/그림자 제거 + 스크롤 차단
     (스케일은 하단 JS가 종횡비 유지하며 처리. 임베드는 영향 없음) */
  html:not(.embed) body { overflow: hidden; }
  html:not(.embed) .phone { border-radius: 0; box-shadow: none; }
  /* 단독 실행: 실제 폰 상태바와 중복되는 가짜 상태바(목업) 숨김 */
  html:not(.embed) .statusbar { display: none; }
  /* 시연자용 갤러리 리셋 — 1×2 점수 카드 위, 우측 정렬. 기호만(눈에 안 띄게).
     Slow Museum 테마에서만 노출 (planet·marble은 아직 보상 초기화 대상 아님). */
  .gallery-reset {
    position: absolute; right: 16px; bottom: calc(296px + var(--nav-bar-h)); z-index: 6;
    width: 24px; height: 24px; border-radius: 50%;
    display: none; place-items: center;
    background: rgba(255,255,255,.32);
    border: 1px solid rgba(80,72,66,.16);
    color: rgba(80,72,66,.7); font-size: 13px; line-height: 1;
    cursor: pointer; opacity: .6;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
    transition: opacity .15s, background .15s;
  }
  #phone[data-theme="museum"] .gallery-reset { display: grid; }
  .gallery-reset:hover { opacity: 1; background: rgba(255,255,255,.7); }

  /* ============================================================
     Phone shell
     ============================================================ */
  .phone {
    width: 360px;
    height: 780px;
    border-radius: 36px;
    box-shadow:
      0 1px 2px rgba(0,0,0,.06),
      0 30px 80px rgba(20,30,60,.22),
      inset 0 0 0 1px rgba(0,0,0,.04);
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(70% 50% at 12% 12%, rgba(176,232,210,.55) 0%, transparent 70%),
      radial-gradient(70% 50% at 92% 58%, rgba(171,222,232,.5) 0%, transparent 70%),
      linear-gradient(180deg, #eef5f1 0%, #e3eef0 100%);
  }

  /* Status bar */
  .statusbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 36px;
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 26px;
    font-family: "Roboto", sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    pointer-events: none;
    letter-spacing: -.1px;
  }
  .statusbar .time { line-height: 1; }
  .statusbar .icons { display: inline-flex; gap: 5px; align-items: center; }
  .statusbar .icons svg { display: block; opacity: .9; }

  /* ============================================================
     Screens — show/hide
     ============================================================ */
  .screen {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  .screen.active { opacity: 1; pointer-events: auto; }

  /* ============================================================
     HOME — Solution Tab
     ============================================================ */
  .home-body {
    position: absolute;
    top: 0; left: 0; right: 0;
    bottom: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 56px 20px 90px;
    --fade: linear-gradient(to bottom,
      transparent 0,
      rgba(0,0,0,.25) 14px,
      rgba(0,0,0,.7) 36px,
      #000 64px,
      #000 calc(100% - 100px),
      rgba(0,0,0,.55) calc(100% - 80px),
      transparent calc(100% - 60px),
      transparent 100%);
    -webkit-mask-image: var(--fade);
            mask-image: var(--fade);
  }
  .home-body > * + * { margin-top: 16px; }
  .home-body::-webkit-scrollbar { width: 0; }

  .head { padding: 10px 4px 6px; }
  .head .greet-eyebrow {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-3);
    letter-spacing: -.2px;
    line-height: 1;
  }
  .head .greet-title {
    font-family: "Roboto", "Noto Sans KR", sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: #2db58a;
    letter-spacing: -.8px;
    line-height: 1;
    margin-top: 3px;
  }

  /* Hero — 새 솔루션 만들기 */
  .hero {
    border-radius: 22px;
    padding: 26px 24px 26px;
    background:
      radial-gradient(85% 70% at 12% 18%, rgba(123,224,184,.78) 0%, transparent 62%),
      radial-gradient(75% 64% at 92% 88%, rgba(108,200,224,.74) 0%, transparent 58%),
      linear-gradient(135deg, rgba(111,217,180,.78) 0%, rgba(108,212,204,.74) 50%, rgba(108,184,226,.78) 100%);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    color: #ffffff;
    position: relative;
    overflow: hidden;
    min-height: 168px;
    display: flex;
    align-items: stretch;
    gap: 16px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.4),
      0 1px 2px rgba(20,50,60,.04),
      0 16px 36px rgba(40, 150, 180, .26);
    border: 1px solid rgba(255,255,255,.32);
    cursor: pointer;
    transition: transform .15s ease;
  }
  .hero:active { transform: scale(.99); }
  .hero .h-body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
  .hero .h-title {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -.5px;
    line-height: 1.25;
    color: #ffffff;
    word-break: keep-all;
    text-shadow: 0 1px 8px rgba(60,40,100,.18);
  }
  .hero .h-meta {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,.95);
    margin-top: 10px;
    line-height: 1.5;
    font-weight: 500;
    letter-spacing: -.1px;
    word-break: keep-all;
    text-shadow: 0 1px 4px rgba(20,70,90,.18);
  }
  .hero .h-arrow {
    align-self: flex-end;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,.25);
    border: 1px solid rgba(255,255,255,.45);
    color: #ffffff;
    display: grid;
    place-items: center;
    cursor: pointer;
    flex: 0 0 44px;
    backdrop-filter: blur(12px) saturate(1.4);
    -webkit-backdrop-filter: blur(12px) saturate(1.4);
    transition: background .15s, transform .1s;
  }
  .hero:hover .h-arrow { background: rgba(255,255,255,.4); }

  /* Section header */
  .sec {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 4px 2px 0;
  }
  .sec-title {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -.3px;
  }
  .sec-sub {
    font-family: "Roboto", sans-serif;
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 500;
    margin-left: 6px;
  }
  .sort-btn {
    background: transparent;
    border: 0;
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    color: var(--ink-2);
    font-weight: 500;
    padding: 4px 0;
    letter-spacing: -.1px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .sort-btn svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2; fill: none; }

  /* List */
  .list {
    background: linear-gradient(160deg, rgba(255,255,255,.62) 0%, rgba(255,255,255,.42) 100%);
    backdrop-filter: blur(22px) saturate(1.5);
    -webkit-backdrop-filter: blur(22px) saturate(1.5);
    border: 1px solid rgba(255,255,255,.55);
    border-radius: 20px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.55),
      0 1px 2px rgba(20,40,35,.04),
      0 12px 28px rgba(40,90,80,.10);
    overflow: hidden;
  }
  .list-item {
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,.5);
    transition: background .15s;
  }
  .list-item:last-child { border-bottom: 0; }
  .list-item:hover { background: rgba(255,255,255,.35); }
  .list-item .li-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .list-item .li-title {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -.3px;
    line-height: 1.2;
    flex: 1 1 auto;
    min-width: 0;
    word-break: keep-all;
  }
  .list-item .li-pct-wrap { display: inline-flex; align-items: center; gap: 10px; flex: 0 0 auto; }
  .list-item .li-pct {
    font-family: "Roboto", sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -.2px;
  }
  .list-item .li-bar {
    width: 48px;
    height: 5px;
    background: rgba(20,60,50,.10);
    border-radius: 4px;
    overflow: hidden;
  }
  .list-item .li-bar i { display: block; height: 100%; background: var(--primary); border-radius: 4px; }
  .list-item .li-row2 {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 500;
    letter-spacing: -.1px;
  }
  .list-item .li-meta { white-space: nowrap; }
  .list-item .li-cat  { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .li-new {
    display: inline-flex;
    align-items: center;
    font-family: "Roboto", sans-serif;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: #ffffff;
    background: var(--gradient-key);
    padding: 3px 7px 2px;
    border-radius: 999px;
    margin-right: 8px;
    line-height: 1;
    flex: 0 0 auto;
    vertical-align: middle;
  }
  .list-item .li-detail { display: none; margin-top: 4px; }
  .list-item.open { background: rgba(255,255,255,.45); }
  .list-item.open .li-detail { display: block; }

  /* Inline nudge */
  .inline-nudge {
    margin-top: 10px;
    padding: 14px 14px 12px;
    background: rgba(255,255,255,.7);
    border: 1px solid rgba(255,255,255,.7);
    border-radius: 14px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.55), 0 1px 2px rgba(20,40,50,.04);
  }

  /* '지금 할 일' 헤더 — 클릭하면 미션 카드 펼침 */
  .mission-sec { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .mission-sec > div { display: flex; align-items: center; }
  .mission-badge {
    margin-left: 7px; min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 999px; background: var(--gradient-key); color: #fff;
    font-family: var(--font); font-size: 10px; font-weight: 800;
    display: inline-flex; align-items: center; justify-content: center;
    animation: mission-glow 1.5s ease-in-out infinite;
  }
  .mission-sec.open .mission-badge { display: none; }
  /* hidden 속성이 display:inline-flex를 이기도록 명시 */
  .mission-badge[hidden] { display: none; }
  /* 미션 0건: 무채색 · glow 없음 (할 일 없음 상태) */
  .mission-badge.zero { background: rgba(80,72,66,.18); color: var(--ink-3); animation: none; }

  /* 실시간(live) 미션 카드 강조 — glow 펄스 */
  @keyframes mission-glow {
    0%, 100% { box-shadow: 0 2px 12px rgba(45,180,160,.20); }
    50%      { box-shadow: 0 6px 30px rgba(45,180,160,.55), 0 0 20px rgba(108,200,224,.40); }
  }
  .mission-nudge {
    position: relative;
    border: 1px solid rgba(108,200,224,.35);
    background: rgba(255,255,255,.88);
    animation: mission-glow 1.5s ease-in-out infinite;
  }
  /* 했어요 버튼 — 흐르는 그라데이션 shimmer (live 강조)
     .inline-nudge .in-do 규칙(동일 특이도·후순위)을 이기려면 특이도를 높여야 함 */
  @keyframes do-shimmer { to { background-position: 220% 0; } }
  .inline-nudge.mission-nudge .in-do {
    background-image: linear-gradient(110deg, #6fd9b4 0%, #6cd4cc 25%, #6cb8e2 50%, #6cd4cc 75%, #6fd9b4 100%);
    background-size: 220% 100%;
    animation: do-shimmer 2.4s linear infinite;
  }
  @media (prefers-reduced-motion: reduce) {
    .mission-nudge, .mission-nudge .in-do { animation: none; }
  }
  .inline-nudge .in-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .inline-nudge .in-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
    flex: 0 0 8px;
  }
  .inline-nudge .in-cat {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -.1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1 1 auto;
    min-width: 0;
  }
  .inline-nudge .in-time {
    font-family: "Roboto", sans-serif;
    font-size: 10.5px;
    color: var(--ink-3);
    font-weight: 500;
    flex: 0 0 auto;
  }
  /* 개인화 오프닝 (상황 인식) — 작게, 행동 위에 */
  .inline-nudge .in-lead {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-2);
    letter-spacing: -.2px;
    word-break: keep-all;
    margin-bottom: 4px;
  }
  /* 핵심 행동 카피 — 크게, 임팩트 */
  .inline-nudge .in-action {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1.2;
    letter-spacing: -.6px;
    word-break: keep-all;
    margin-bottom: 8px;
  }
  /* 트리거/이유 — 작게, 아래에 */
  .inline-nudge .in-reason {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 11px;
    color: var(--ink-3);
    line-height: 1.5;
    word-break: keep-all;
    margin-bottom: 14px;
    font-weight: 400;
    padding-left: 9px;
    border-left: 2px solid var(--primary-soft);
  }
  .inline-nudge .in-actions { display: flex; gap: 6px; }
  .inline-nudge .in-btn {
    border: 0;
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    padding: 9px 14px;
    border-radius: 10px;
    letter-spacing: -.1px;
    transition: transform .1s, background .15s;
  }
  .inline-nudge .in-btn:active { transform: scale(.98); }
  .inline-nudge .in-do { flex: 1.4; background: var(--gradient-key); color: #ffffff; }
  .inline-nudge .in-do:hover { filter: brightness(1.04); }
  .inline-nudge .in-skip { flex: 1; background: rgba(20,60,70,.06); color: var(--ink-2); }

  /* Tab bar */
  .tabbar {
    position: absolute;
    bottom: var(--nav-bar-h); left: 0; right: 0;
    height: 56px;
    z-index: 25;
    background: transparent;
    display: flex;
    padding: 0 24px 8px;
  }
  .tab {
    flex: 1;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: "Noto Sans KR", sans-serif;
    color: var(--ink-3);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -.2px;
    height: 100%;
    position: relative;
    transition: color .15s;
  }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--primary); font-weight: 700; }
  .tab.active::after {
    content: "";
    position: absolute;
    left: 38%; right: 38%;
    bottom: 6px;
    height: 3px;
    border-radius: 2px;
    background: var(--primary);
  }

  /* ============================================================
     CHAT — Agent Builder
     ============================================================ */
  .appbar {
    position: absolute;
    top: 36px; left: 0; right: 0;
    height: 52px;
    z-index: 25;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
  }
  .back-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: transparent;
    border: 0;
    cursor: pointer;
    display: grid;
    place-items: center;
    color: var(--ink);
    transition: background .15s;
    flex: 0 0 36px;
  }
  .back-btn:hover { background: rgba(255,255,255,.5); }
  .back-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .appbar-title { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; padding-left: 4px; }
  .appbar-title .at-title {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -.3px;
    line-height: 1;
  }

  .chat {
    position: absolute;
    top: 88px;
    left: 0; right: 0;
    bottom: calc(76px + var(--nav-bar-h));
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    --fade: linear-gradient(to bottom,
      transparent 0,
      rgba(0,0,0,.4) 8px,
      #000 28px,
      #000 calc(100% - 24px),
      transparent 100%);
    -webkit-mask-image: var(--fade);
            mask-image: var(--fade);
  }
  .chat::-webkit-scrollbar { width: 0; }

  .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 100%; }
  .msg.agent { justify-content: flex-start; }
  .msg.user  { justify-content: flex-end; }
  .agent-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6fd9b4 0%, #6cd4cc 60%, #6cb8e2 100%);
    display: grid;
    place-items: center;
    flex: 0 0 28px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 1px 4px rgba(40,150,170,.20);
    position: relative;
  }
  .agent-avatar::after {
    content: "";
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,.95);
    box-shadow: 0 0 0 1px rgba(255,255,255,.3);
  }
  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 13.5px;
    line-height: 1.55;
    letter-spacing: -.2px;
    word-break: keep-all;
  }
  .msg.agent .bubble {
    background: linear-gradient(160deg, rgba(255,255,255,.58) 0%, rgba(255,255,255,.35) 100%);
    border: 1px solid rgba(255,255,255,.55);
    backdrop-filter: blur(22px) saturate(1.5);
    -webkit-backdrop-filter: blur(22px) saturate(1.5);
    color: var(--ink);
    border-bottom-left-radius: 6px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.55), 0 1px 2px rgba(20,40,50,.04), 0 6px 18px rgba(40,90,110,.08);
  }
  .msg.user .bubble {
    background:
      radial-gradient(85% 70% at 12% 18%, rgba(123,224,184,.78) 0%, transparent 62%),
      radial-gradient(75% 64% at 92% 88%, rgba(108,200,224,.74) 0%, transparent 58%),
      linear-gradient(135deg, rgba(111,217,180,.88) 0%, rgba(108,212,204,.85) 50%, rgba(108,184,226,.88) 100%);
    backdrop-filter: blur(18px) saturate(1.5);
    -webkit-backdrop-filter: blur(18px) saturate(1.5);
    border: 1px solid rgba(255,255,255,.5);
    color: #ffffff;
    font-weight: 500;
    border-bottom-right-radius: 6px;
    text-shadow: 0 1px 4px rgba(20,70,90,.18);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.45), 0 6px 18px rgba(40,150,180,.20);
  }
  .bubble p { margin: 0; }
  .bubble p + p { margin-top: 6px; }

  /* Quick reply chips */
  .quick-replies { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin-top: 2px; }
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 10px 16px;
    border-radius: 999px;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: -.2px;
    color: var(--primary);
    border: 1.5px solid transparent;
    background:
      linear-gradient(#ffffff, #ffffff) padding-box,
      var(--gradient-key) border-box;
    transition: color .15s, transform .1s;
  }
  .chip:hover, .chip.selected {
    color: #ffffff;
    background: var(--gradient-key) padding-box, var(--gradient-key) border-box;
    text-shadow: 0 1px 4px rgba(20,70,90,.18);
    box-shadow: 0 6px 16px rgba(40,150,180,.22);
  }
  .chip:active { transform: scale(.97); }

  /* Composer */
  .composer {
    position: absolute;
    left: 12px; right: 12px;
    bottom: calc(12px + var(--nav-bar-h));
    height: 48px;
    z-index: 28;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 5px 0 18px;
    border-radius: 999px;
    background: rgba(255,255,255,.62);
    border: 1px solid rgba(255,255,255,.65);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.55), 0 1px 2px rgba(20,40,50,.04), 0 8px 22px rgba(40,90,110,.10);
  }
  .composer-input {
    flex: 1 1 auto;
    min-width: 0;
    border: 0;
    background: transparent;
    outline: none;
    font-family: var(--font);
    font-size: 13.5px;
    color: var(--ink);
    letter-spacing: -.1px;
    height: 100%;
  }
  .composer-input::placeholder { color: var(--ink-3); }
  .composer-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 0;
    background: transparent;
    color: var(--ink-3);
    cursor: pointer;
    display: grid;
    place-items: center;
    flex: 0 0 36px;
    transition: color .15s, background .15s;
  }
  .composer-icon:hover { color: var(--ink); background: rgba(20,60,70,.06); }
  .composer-icon svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .composer-send {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 0;
    cursor: pointer;
    display: grid;
    place-items: center;
    flex: 0 0 36px;
    background: linear-gradient(135deg, #6fd9b4 0%, #6cd4cc 50%, #6cb8e2 100%);
    color: #ffffff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 4px 10px rgba(40,150,180,.25);
    transition: transform .1s;
  }
  .composer-send:active { transform: scale(.94); }
  .composer-send svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* UI Card (agent-generated widget) */
  .ui-card {
    background: linear-gradient(160deg, rgba(255,255,255,.78) 0%, rgba(255,255,255,.58) 100%);
    border: 1px solid rgba(255,255,255,.65);
    backdrop-filter: blur(22px) saturate(1.5);
    -webkit-backdrop-filter: blur(22px) saturate(1.5);
    border-radius: 22px;
    padding: 18px 18px 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 1px 2px rgba(20,40,50,.04), 0 12px 30px rgba(40,90,110,.10);
    max-width: 100%;
  }
  .uc-head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .uc-step {
    font-family: "Roboto", sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    background: var(--gradient-key);
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
  }
  .uc-title {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -.3px;
  }
  .uc-confirm {
    width: 100%;
    background: var(--gradient-key);
    border: 0;
    color: #ffffff;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: -.2px;
    margin-top: 20px;
    transition: transform .1s, filter .15s;
  }
  .uc-confirm:hover { filter: brightness(1.04); }
  .uc-confirm:active { transform: scale(.985); }

  /* Step 4 — Plan estimate */
  .plan-hero { padding: 2px 2px 14px; display: flex; flex-direction: column; gap: 6px; }
  .plan-eyebrow {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 11.5px;
    color: var(--ink-3);
    font-weight: 600;
    letter-spacing: -.1px;
  }
  .plan-title {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.5px;
    line-height: 1.35;
    padding: 0 4px 5px 0;   /* background-clip:text 디센더(g·기) 잘림 방지 */
    word-break: keep-all;
    background: var(--gradient-key);
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }
  .plan-summary {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 11.5px;
    color: var(--ink-2);
    font-weight: 500;
    letter-spacing: -.1px;
    line-height: 1.5;
    margin-top: 8px;
    word-break: keep-all;
  }
  .plan-summary strong { color: var(--ink); font-weight: 700; }
  .plan-divider { height: 1px; background: rgba(20,60,70,.10); margin: 8px 0 14px; }
  /* 플랜 견적 4카테고리 — 핵심 수치만 컴팩트 2×2 */
  .plan-cats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .plan-cat {
    background: rgba(255,255,255,.5);
    border: 1px solid rgba(20,60,70,.06);
    border-radius: 12px;
    padding: 11px 13px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .plan-cat .pc-name {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 11.5px; font-weight: 700; color: var(--ink-3);
    letter-spacing: -.2px;
  }
  .plan-cat .pc-val {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 15px; font-weight: 800; color: var(--ink);
    letter-spacing: -.3px;
  }
  .plan-checkpoint {
    margin-top: 16px;
    padding: 8px 12px 10px;
    background: rgba(255,255,255,.55);
    border: 1px solid rgba(255,255,255,.55);
    border-radius: 12px;
  }
  .plan-actions { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .plan-actions .uc-confirm { margin-top: 0; }
  .plan-secondary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* Timeline (중간점검) */
  .timeline {
    position: relative;
    margin: 6px 8px 4px;
    height: 46px;
  }
  .tl-line {
    position: absolute;
    left: 0; right: 0;
    top: 8px;
    height: 2px;
    background: linear-gradient(to right,
      rgba(20,60,70,.16) 0%,
      rgba(108,212,204,.45) 50%,
      rgba(108,184,226,.55) 100%);
    border-radius: 1px;
  }
  .tl-node {
    position: absolute;
    top: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateX(-50%);
  }
  .tl-node.tl-start { left: 0; transform: none; align-items: flex-start; }
  .tl-node.tl-end   { right: 0; left: auto; transform: none; align-items: flex-end; }
  .tl-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gradient-key);
    box-shadow: 0 0 0 3px rgba(255,255,255,.7), 0 1px 3px rgba(40,150,180,.25);
    margin-top: -4px;
    z-index: 2;
  }
  .tl-dot.tl-dot-mile {
    width: 10px; height: 10px;
    background: #ffffff;
    border: 2px solid transparent;
    background-image:
      linear-gradient(#ffffff, #ffffff),
      var(--gradient-key);
    background-origin: border-box;
    background-clip: padding-box, border-box;
  }
  .tl-day {
    font-family: "Roboto", sans-serif;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -.1px;
    line-height: 1;
    margin-top: 8px;
    white-space: nowrap;
  }
  .tl-label {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-3);
    letter-spacing: -.1px;
    line-height: 1;
    margin-top: 4px;
    white-space: nowrap;
  }
  .tl-node.tl-start .tl-day,
  .tl-node.tl-end .tl-day { color: var(--ink); }
  .btn-ghost {
    border: 0;
    cursor: pointer;
    font-family: var(--font);
    font-size: 12.5px;
    font-weight: 600;
    padding: 11px 10px;
    border-radius: 12px;
    letter-spacing: -.2px;
    color: var(--ink-2);
    background: rgba(20,60,70,.06);
    transition: background .15s, color .15s;
  }
  .btn-ghost:hover { background: rgba(20,60,70,.10); color: var(--ink); }

  /* ============================================================
     Step 1 — photo + fields
     ============================================================ */
  .photo-slot {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 12px 14px;
    border: 1.5px dashed rgba(20,60,70,.22);
    border-radius: 16px;
    background: transparent;
    font-family: inherit; cursor: pointer; text-align: left;
    transition: border-color .15s, background .15s;
  }
  .photo-slot:hover { border-color: var(--primary); background: rgba(255,255,255,.4); }
  .photo-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--gradient-key); color: #fff;
    display: grid; place-items: center; flex: 0 0 44px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 4px 10px rgba(40,150,180,.2);
  }
  .photo-icon svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .photo-label {
    flex: 1 1 auto; min-width: 0;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 13.5px; font-weight: 700;
    color: var(--ink); letter-spacing: -.2px;
  }
  .photo-hint {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 10.5px; color: var(--ink-3);
    letter-spacing: -.1px; margin-top: 8px;
    padding-left: 4px; line-height: 1.4;
  }
  .photo-skip {
    font-size: 11px; color: var(--primary);
    font-weight: 700; flex: 0 0 auto; letter-spacing: -.1px;
    cursor: pointer; padding: 4px 6px; border-radius: 8px;
  }
  .photo-skip:hover { background: rgba(40,150,180,.1); }
  /* 업로드 완료 상태 */
  .photo-slot.is-done { border-style: solid; border-color: var(--primary); background: rgba(255,255,255,.5); }
  .photo-slot.is-done .photo-icon { overflow: hidden; padding: 0; }
  .photo-slot .photo-icon img { width: 100%; height: 100%; object-fit: cover; }
  /* 건너뛰기 선택 상태 */
  .photo-slot.is-skipped { opacity: .55; }

  /* Step 1 — 에이전트가 찾은 사진 + 데이터 연동 (능동형) */
  .found-photo {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 14px;
    background: rgba(255,255,255,.55);
    border: 1px solid rgba(20,60,70,.08);
  }
  .fp-thumb {
    width: 46px; height: 58px; flex: 0 0 46px;
    border-radius: 10px; overflow: hidden;
    background: linear-gradient(160deg, #eef5f3, #dde9e8);
    display: grid; place-items: center;
  }
  .fp-thumb svg { width: 78%; height: 86%; display: block; }
  .fp-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .fp-text { flex: 1 1 auto; min-width: 0; }
  .fp-title { font-family: "Noto Sans KR", sans-serif; font-size: 13px; font-weight: 700; color: var(--ink); letter-spacing: -.2px; }
  .fp-sub { font-size: 11px; color: var(--ink-3); margin-top: 3px; letter-spacing: -.1px; }
  .fp-check {
    width: 22px; height: 22px; flex: 0 0 22px; border-radius: 50%;
    background: var(--gradient-key); color: #fff;
    display: grid; place-items: center; font-size: 12px; font-weight: 700;
  }
  .connect-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .connect-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 12px;
    background: rgba(255,255,255,.45);
    border: 1px solid rgba(20,60,70,.07);
  }
  .connect-ico {
    width: 34px; height: 34px; flex: 0 0 34px; border-radius: 9px;
    background: rgba(108,200,224,.16);
    display: grid; place-items: center; font-size: 17px;
  }
  .connect-meta { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; }
  .connect-meta b { font-family: "Noto Sans KR", sans-serif; font-size: 12.5px; font-weight: 700; color: var(--ink); letter-spacing: -.2px; }
  .connect-meta span { font-size: 10.5px; color: var(--ink-3); margin-top: 1px; letter-spacing: -.1px; }
  .connect-tag { font-size: 10px; font-weight: 700; color: var(--primary); background: rgba(26,166,194,.1); padding: 3px 8px; border-radius: 999px; flex: 0 0 auto; }

  .uc-section { margin-top: 18px; }
  .uc-section-label {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--ink-2); letter-spacing: -.2px; margin-bottom: 12px;
  }
  .fields-grid { display: grid; gap: 14px 12px; }
  .fields-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
  .fields-grid.g2 { grid-template-columns: 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .field-label {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 10.5px; color: var(--ink-3);
    font-weight: 600; letter-spacing: -.1px;
  }
  .field-value {
    display: flex; align-items: baseline; gap: 3px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(20,60,70,.16);
    transition: border-bottom-color .15s; min-width: 0;
  }
  .field-value:focus-within { border-bottom-color: var(--primary); }
  .field-value input {
    flex: 1 1 auto; border: 0; background: transparent;
    font-family: "Roboto", sans-serif;
    font-size: 17px; font-weight: 700;
    color: var(--ink); width: 100%; min-width: 0;
    outline: none; padding: 0; letter-spacing: -.3px;
  }
  .field-unit { font-family: "Roboto", sans-serif; font-size: 11px; color: var(--ink-3); font-weight: 500; flex: 0 0 auto; }
  .seg {
    display: inline-flex; border-radius: 999px;
    background: rgba(20,60,70,.06); padding: 2px;
    align-self: flex-start; margin-top: 2px;
  }
  .seg-opt {
    border: 0; background: transparent;
    padding: 6px 14px;
    font-family: "Roboto", sans-serif;
    font-size: 12.5px; font-weight: 700;
    color: var(--ink-3); border-radius: 999px;
    cursor: pointer; transition: color .15s;
  }
  .seg-opt.active {
    background: var(--gradient-key); color: #fff;
    text-shadow: 0 1px 3px rgba(20,70,90,.18);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 2px 6px rgba(40,150,180,.18);
  }

  /* ============================================================
     Step 2 — silhouettes + slider
     ============================================================ */
  .silhouettes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .silh {
    position: relative; aspect-ratio: 3 / 4;
    border-radius: 16px;
    background: rgba(20,60,70,.04);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .silh.target { background: linear-gradient(160deg, rgba(123,224,184,.20) 0%, rgba(108,184,226,.22) 100%); }
  .silh-svg { width: 58%; height: 85%; }
  .silh-svg path { transition: d .25s ease; }
  /* 사용자 사진 모드: canvas가 silh 박스를 채움 */
  .silh-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .silh-caption {
    position: absolute; bottom: 8px; left: 10px;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--ink-3); letter-spacing: -.1px; line-height: 1;
  }
  .silh.target .silh-caption {
    background: var(--gradient-key);
    color: #fff;
    padding: 3px 9px;
    border-radius: 999px;
    line-height: 1;
  }
  .comp-row {
    margin-top: 18px;
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 6px; text-align: center;
  }
  .comp-cell { padding: 4px 2px; }
  .comp-label {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 10.5px; color: var(--ink-3);
    font-weight: 600; letter-spacing: -.1px; margin-bottom: 4px;
  }
  .comp-num {
    font-family: "Roboto", sans-serif;
    font-size: 22px; font-weight: 800;
    letter-spacing: -.6px; color: var(--ink); line-height: 1;
  }
  .comp-num .unit { font-size: 11px; color: var(--ink-3); font-weight: 500; margin-left: 2px; letter-spacing: 0; }
  .comp-num.changed {
    background: var(--gradient-key);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .comp-num.warn { background: none; color: #d97757; -webkit-text-fill-color: #d97757; }
  .warn-msg {
    margin-top: 12px; padding: 9px 12px;
    background: rgba(217, 119, 87, .12);
    color: #b8553a; border-radius: 10px;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 11.5px; font-weight: 600;
    letter-spacing: -.1px; text-align: center;
    line-height: 1.4; word-break: keep-all;
  }
  .warn-msg[hidden] { display: none; }
  .slider-wrap { margin-top: 18px; padding: 0 2px; }
  .slider-ends {
    display: flex; justify-content: space-between;
    font-family: "Noto Sans KR", sans-serif;
    font-size: 10.5px; color: var(--ink-3);
    font-weight: 600; letter-spacing: -.1px; margin-bottom: 8px;
  }
  .slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px; border-radius: 3px;
    background: rgba(20,60,70,.12); outline: none; cursor: pointer;
    background-image: var(--gradient-key);
    background-size: var(--fill, 25%) 100%;
    background-repeat: no-repeat;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 3px solid transparent;
    background-image: linear-gradient(#fff, #fff), var(--gradient-key);
    background-origin: border-box;
    background-clip: padding-box, border-box;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(40,150,180,.30);
  }
  .slider.warn { background-image: linear-gradient(135deg, #f0a496 0%, #d97757 100%); }
  .slider.warn::-webkit-slider-thumb {
    background-image: linear-gradient(#fff, #fff), linear-gradient(135deg, #f0a496 0%, #d97757 100%);
    box-shadow: 0 4px 10px rgba(217, 119, 87, .35);
  }

  /* ============================================================
     Step 3 — date list
     ============================================================ */
  .date-list { display: flex; flex-direction: column; gap: 8px; }
  .date-opt {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 14px;
    background: rgba(255,255,255,.6);
    border: 1.5px solid transparent;
    background-clip: padding-box;
    cursor: pointer; transition: background .15s; position: relative;
  }
  .date-opt input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; }
  .date-opt:hover { background: rgba(255,255,255,.85); }
  .date-opt.selected {
    border: 1.5px solid transparent;
    background: linear-gradient(#fff, #fff) padding-box, var(--gradient-key) border-box;
    box-shadow: 0 4px 14px rgba(40,150,180,.10);
  }
  .date-body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .date-title {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--ink); letter-spacing: -.3px; line-height: 1.2;
  }
  .date-sub {
    font-family: "Roboto", sans-serif;
    font-size: 11.5px; color: var(--ink-3);
    font-weight: 500; letter-spacing: -.1px;
  }
  .date-day {
    font-family: "Roboto", sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--ink-3); letter-spacing: -.2px;
    flex: 0 0 auto; line-height: 1;
  }
  .date-opt.selected .date-day {
    background: var(--gradient-key);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .date-bullet {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid rgba(20,60,70,.20);
    flex: 0 0 18px; position: relative;
  }
  .date-bullet::after {
    content: ""; position: absolute; inset: 3px;
    border-radius: 50%; background: var(--gradient-key);
    transform: scale(0); transition: transform .15s ease;
  }
  .date-opt.selected .date-bullet {
    border: 1.5px solid transparent;
    background: linear-gradient(#fff, #fff) padding-box, var(--gradient-key) border-box;
  }
  .date-opt.selected .date-bullet::after { transform: scale(1); }
  /* 직접 입력 날짜 필드 */
  .date-custom {
    font-family: var(--font); font-size: 12px; font-weight: 600;
    color: var(--ink); background: #fff;
    border: 1px solid rgba(20,60,70,.16); border-radius: 9px;
    padding: 5px 8px; margin-right: 8px;
    flex: 0 0 auto; max-width: 130px;
  }
  /* ============================================================
     Dashboard — 3D 테마 갤러리 (iframe) + 글래스 점수 카드
     ============================================================ */
  .museum-stage { position: absolute; inset: 0; overflow: hidden; background: #e9ded0; }
  .museum-frame {
    width: 360px; height: 780px; border: 0; background: transparent;
    position: absolute; top: 0; left: 0; display: none;
  }
  .museum-frame.active { display: block; }
  .museum-loading {
    position: absolute; inset: 0; background: #e9ded0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 4; color: #7d7169; font-size: 13px; font-weight: 600; letter-spacing: .3px;
  }
  .museum-loading[hidden] { display: none; }
  .loading-spinner {
    width: 32px; height: 32px; border: 3px solid rgba(125,113,105,.25);
    border-top-color: #7d7169; border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 테마 캐러셀 도트 (우상단) */
  .theme-dots { position: absolute; top: 50px; right: 24px; z-index: 6; display: flex; align-items: center; gap: 5px; }
  .theme-dot { width: 8px; height: 8px; padding: 0; border: 0; border-radius: 999px; background: rgba(80,72,66,.32); cursor: pointer; transition: background .25s ease; position: relative; }
  /* 보이는 도트는 8px 그대로, 클릭/호버 영역만 투명하게 확대 → 포인터 커서 잘 잡힘 */
  .theme-dot::after { content: ""; position: absolute; inset: -8px -4px; }
  .theme-dot:hover { background: rgba(80,72,66,.55); }
  .theme-dot.active { background: #7d7169; }

  /* 점수 카드 — glassmorphism (솔루션 탭 .list 글래스와 동일 스펙: blur22·saturate1.5·엣지·그림자,
     채움색만 각 테마 배경색으로) */
  .score-cards {
    position: absolute; left: 16px; right: 16px; bottom: calc(70px + var(--nav-bar-h)); z-index: 5;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .scard {
    background: var(--glass-fill);
    backdrop-filter: blur(22px) saturate(1.5);
    -webkit-backdrop-filter: blur(22px) saturate(1.5);
    border: 1px solid var(--glass-edge);
    border-radius: 18px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.55),
      0 1px 2px rgba(20,40,35,.04),
      0 12px 28px rgba(40,90,80,.10);
    padding: 14px 16px;
    min-height: 104px;
    position: relative;
    display: flex; flex-direction: column; align-items: flex-start; gap: 7px;
  }
  .scard .s-tag {
    order: 2; margin-top: auto;          /* 태그를 카드 하단으로 */
    font-family: "Noto Sans KR", sans-serif; font-size: 9px; font-weight: 500;
    letter-spacing: .6px; text-transform: uppercase; line-height: 1;
    color: var(--ink-3); background: rgba(20,60,50,.09);
    padding: 4px 8px; border-radius: 999px;
  }
  .scard-new .s-tag { order: 0; margin-top: 0; }   /* NEW 태그는 상단 유지 */
  .scard .s-tag-new  { color: #fff; background: var(--theme-key); }
  .scard .s-tag-done { color: var(--ink-3); background: rgba(20,40,35,.07); }
  /* museum·marble 테마: 태그 웜그레이 틴트 fill + 웜그레이 글자 (NEW 제외 — NEW는 테마 키컬러 유지) */
  #phone[data-theme="museum"] .scard .s-tag:not(.s-tag-new),
  #phone[data-theme="marble"] .scard .s-tag:not(.s-tag-new) {
    color: #7d7169;
    background: rgba(148,138,127,.20);
  }
  .scard .s-title {
    order: 1;                            /* 제목을 카드 상단으로 */
    font-family: "Noto Sans KR", sans-serif; font-size: 14px; font-weight: 500;
    color: var(--ink-3); letter-spacing: -.3px; line-height: 1.25; word-break: keep-all;
  }
  /* 제목 색 = 각 테마 태그 텍스트 색 */
  #phone[data-theme="museum"] .scard .s-title,
  #phone[data-theme="marble"] .scard .s-title { color: #7d7169; }
  .scard .s-score {
    position: absolute; right: 14px; bottom: 12px;
    font-family: "Roboto", sans-serif; font-size: 26px; font-weight: 800; line-height: 1;
    color: var(--theme-key);
  }
  .scard .s-plus { font-size: 30px; font-weight: 400; }
  .scard-new { cursor: pointer; }
  .scard-new:active { transform: scale(.98); }

  /* 글래스 토큰: 채움은 반투명 화이트(테마 공통), 키 컬러만 테마별(=제목 색) */
  #phone {
    --glass-fill: linear-gradient(160deg, rgba(255,255,255,.62) 0%, rgba(255,255,255,.42) 100%);
    --glass-edge: rgba(255,255,255,.6);
    --theme-key: #675d56;
  }
  #phone[data-theme="museum"] { --theme-key: #675d56; }
  #phone[data-theme="planet"] { --theme-key: #73CCA3; }
  #phone[data-theme="marble"] { --theme-key: #ff9d6b; }
  /* 대시보드 하단 탭 활성색 = 테마 키 컬러 */
  #screen-dashboard .tab.active { color: var(--theme-key); }
  #screen-dashboard .tab.active::after { background: var(--theme-key); }
  /* museum·marble 테마에선 비활성 탭("실험실") 텍스트 화이트 (어두운/웜 배경 대비) */
  #phone[data-theme="museum"] #screen-dashboard .tab:not(.active) { color: #948a7f; }
  #phone[data-theme="marble"] #screen-dashboard .tab:not(.active) { color: #948a7f; }
</style>
</head>

<script>
  /* === Screen navigation === */
  const screenHome = document.getElementById('screen-home');
  const screenChat = document.getElementById('screen-chat');
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  document.getElementById('enterChat').addEventListener('click', () => {
    resetChat();
    showScreen('screen-chat');
  });
  document.getElementById('backBtn').addEventListener('click', () => showScreen('screen-home'));

  /* === Chat helpers === */
  const chatEl = document.getElementById('chat');
  let _scrollAnchor = null;   // 스크롤 기준 = 마지막 사용자 메시지 (없으면 마지막 요소)
  function appendAgent(html) {
    const w = document.createElement('div');
    w.className = 'msg agent';
    w.innerHTML = `<div class="agent-avatar"></div><div class="bubble">${html}</div>`;
    chatEl.appendChild(w); scrollChat();
  }
  function appendUser(text) {
    const w = document.createElement('div');
    w.className = 'msg user';
    w.innerHTML = `<div class="bubble">${text}</div>`;
    chatEl.appendChild(w); _scrollAnchor = w; scrollChat();
  }
  function appendNode(node) { chatEl.appendChild(node); scrollChat(); }
  // 사용자 입력을 상단에 고정하고, 에이전트 답변/위젯이 그 아래로 순차로 보이게 (맨 아래 점프 금지)
  function scrollChat() {
    requestAnimationFrame(() => {
      const anchor = (_scrollAnchor && _scrollAnchor.isConnected) ? _scrollAnchor : chatEl.lastElementChild;
      if (!anchor) return;
      const delta = anchor.getBoundingClientRect().top - chatEl.getBoundingClientRect().top - 12;
      chatEl.scrollTop += delta;
    });
  }

  /* === Composer === */
  const composerInput = document.getElementById('composerInput');
  const composerSend = document.getElementById('composerSend');
  function sendComposer() {
    const text = composerInput.value.trim();
    if (!text) return;
    appendUser(text); composerInput.value = '';
  }
  composerSend.addEventListener('click', sendComposer);
  composerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendComposer(); });

  /* === Chat state machine === */
  let planAdded = false;

  /* ── 동적 플랜 상태 + 체성분 모델 ──
     체지방량 = 체중×체지방률, 제지방량 = 체중−체지방량,
     근육량(골격근량) = 제지방량 × 근육비(F .50 / M .55). 세 값이 항상 정합. */
  const flow = {};
  const TODAY = new Date(2026, 4, 25);  // 2026-05-25 (데모 기준일)
  const DAY_MS = 86400000;
  const dday = (target) => Math.max(0, Math.round((target - TODAY) / DAY_MS));
  const fmtDate = (d) => d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
  const addMonths = (base, m) => { const d = new Date(base); d.setMonth(d.getMonth()+m); return d; };
  const MEMORY_EVENTS = [
    { key:'wedding', title:'My Wedding',     date:new Date(2026,7,15) },
    { key:'hawaii',  title:'Trip to Hawaii', date:new Date(2026,9,3)  },
  ];
  const muscleRatio = (gender) => gender === 'M' ? 0.55 : 0.50;
  function bodyComp(weight, fatPct, gender) {
    const fatMass = weight * fatPct / 100;
    const lean = weight - fatMass;
    const muscle = lean * muscleRatio(gender);
    return { fatMass, lean, muscle };
  }
  const numFrom = (s) => parseFloat(String(s).replace(/[^0-9.]/g, '')) || 0;
  function resetChat() {
    chatEl.innerHTML = '';
    flow.solutionName = null;
    // 단계 1: 인사 + 도입 한 문장
    appendAgent(
      '<p>안녕하세요, 소연님 🌱</p>'
      + '<p>최근 두 달 데이터에서 이런 흔적이 보였어요.</p>'
    );
    // 단계 2 (800ms): 발견된 신호 카드
    setTimeout(() => {
      appendIntroSignals();
      // 단계 3 (1100ms): CTA 텍스트
      setTimeout(() => {
        appendAgent(
          '<p>시작할 마음은 있으셨던 것 같은데, 어디부터 갈지 같이 정해볼까요?</p>'
        );
        // 단계 4 (500ms): 선택지 버튼
        setTimeout(() => { appendQuickReplies(); }, 500);
      }, 1100);
    }, 800);
  }
  function appendIntroSignals() {
    const card = document.createElement('div');
    card.className = 'ui-card';
    card.innerHTML = `
      <div class="uc-head">
        <span class="uc-step">발견</span>
        <span class="uc-title">소연님의 최근 두 달</span>
      </div>
      <div class="connect-list">
        <div class="connect-row">
          <div class="connect-ico">🛒</div>
          <div class="connect-meta">
            <b>운동복·요가매트 찜</b>
            <span>쇼핑 위시리스트 5건 추가</span>
          </div>
          <span class="connect-tag">60일</span>
        </div>
        <div class="connect-row">
          <div class="connect-ico">📷</div>
          <div class="connect-meta">
            <b>다이어트 식단·루틴 캡처</b>
            <span>갤러리 스크린샷 12장</span>
          </div>
          <span class="connect-tag">60일</span>
        </div>
      </div>
    `;
    appendNode(card);
  }
  const SOLUTION_LABELS = {
    body: '🏃 내 몸 가꾸기 루틴',
    diet: '🥗 건강 식단 리셋',
  };
  const SOLUTION_PLAN_NAMES = {
    body: '내 몸 가꾸기 루틴',
    diet: '건강 식단 리셋',

      img.onload = () => {

    function sizeCanvas(cv) {
      const r = cv.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

    function drawWarp(cv, img, amt) {

    `;
    appendNode(card);
    card.querySelector('[data-confirm="4"]').addEventListener('click', () => onStep4Confirm(card));
  }
  function onStep4Confirm(card) {
    card.querySelector('[data-confirm="4"]').disabled = true;
    appendUser('이 플랜으로 시작');
    setTimeout(() => {
      appendAgent('<p>플랜이 저장됐어요.</p><p>홈에서 매일 함께 지켜볼게요. 🌱</p>');
      if (!planAdded) { addNewPlanCard(); updateDashNewCard(); planAdded = true; }
      setTimeout(() => showScreen('screen-home'), 900);
    }, 350);
  }

  function addNewPlanCard() {
    const list = document.getElementById('solList');
    const item = document.createElement('div');
    item.className = 'list-item';
    item.dataset.key = 'newplan';
    item.innerHTML = `
      <div class="li-row1">
        <div class="li-title"><span class="li-new">New</span>${(flow.totalLoss||5)}kg 가벼워지기</div>
        <div class="li-pct-wrap"><span class="li-pct">0%</span><span class="li-bar"><i style="width:0%"></i></span></div>
      </div>
      <div class="li-row2"><span class="li-meta">D-${(flow.targetDays||86)}</span><span class="li-cat">${flow.targetTitle||'목표일'}</span></div>
    `;
    list.insertBefore(item, list.firstChild);
    document.getElementById('solCount').textContent = '3';
    // 솔루션 생성 → '지금 할 일' 뱃지 0 → 1 (무채색 → 활성 그라데이션+glow).
    // 헤더를 누르면 미션 카드가 펼쳐짐. (생성 직후엔 카드 접힌 상태)
    const badge = document.getElementById('missionBadge');
    badge.textContent = '1';
    badge.classList.remove('zero');
  }

  /* === Inline nudge cycling === */
  const NUDGES = [
    { cat: '잘 태우기', time: '오후 6:40',
      lead: '버스로 퇴근 중이시네요.',
      action: '세곡사거리에 내려서 1.2km 걸어가세요',
      keyword: '세곡사거리 1.2km 걷기',
      reason: '오늘 걸음수 목표의 절반 · 1.2km면 약 1,700보를 더 채워요' },
    { cat: '잘 빠지기', time: '오전 7:02',
      lead: '일어나셨네요.',
      action: '5분 안에 체중을 측정하세요',
      keyword: '공복 체중 측정',
      reason: '공복 체중이 가장 정확해요 · 어제 측정을 건너뛰었어요' },
    { cat: '잘 빠지기', time: '밤 11:48',
      lead: '쿠팡이츠를 켜셨네요.',
      action: '앱을 닫고 방울토마토를 드세요',
      keyword: '야식 대신 방울토마토',
      reason: '야식 한 끼가 오늘의 칼로리 적자를 되돌려요 · 저칼로리 간식으로 식욕을 달래보세요' },
    { cat: '잘 태우기', time: '오후 9:30',
      lead: '넷플릭스 보는 중이시네요.',
      action: '잠시 멈추고 스쿼트 20개 하세요',
      keyword: '스쿼트 20개',
      reason: '2시간째 앉아 있어요 · 짧은 근력 운동이 식후 지방 축적을 막아요' },
    { cat: '잘 태우기', time: '방금',
      lead: '식사를 마치셨군요.',
      action: '바로 율동공원 둘레길 한 바퀴 걸으세요',
      keyword: '율동공원 둘레길 걷기',
      reason: '최근 3일 걸음수 목표의 60% · 식후 활동이 혈당 스파이크를 눌러요' },
  ];
  let nudgeIdx = 0;
  let nudgeMount = document.querySelector('[data-nudge]');
  function renderNudge() {
    const n = NUDGES[nudgeIdx];
    nudgeMount.innerHTML = `
      <div class="in-top">
        <span class="in-dot"></span>
        <span class="in-cat">${n.cat} · 위협 감지</span>
        <span class="in-time">${n.time}</span>
      </div>
      <div class="in-lead">${n.lead}</div>
      <div class="in-action">${n.action}</div>
      <div class="in-reason">${n.reason}</div>
      <div class="in-actions">
        <button class="in-btn in-do">했어요</button>
        <button class="in-btn in-skip">나중에</button>
      </div>
    `;
    nudgeMount.querySelector('.in-do').addEventListener('click', (e) => {
      e.stopPropagation();
      onNudgeDone(nudgeIdx);   // 미션 완료 → 갤러리에 보상 추가 + 대시보드로 전환
    });
    nudgeMount.querySelector('.in-skip').addEventListener('click', (e) => {
      e.stopPropagation();
      nudgeIdx = (nudgeIdx + 1) % NUDGES.length;   // '나중에' → 다음 미션으로
      renderNudge();
    });
  }
  if (nudgeMount) renderNudge();

  /* '지금 할 일' 헤더 클릭 → 미션 카드 펼침/접기 */
  (function () {
    const sec = document.getElementById('missionSec');
    const card = document.getElementById('missionNudge');
    if (!sec || !card) return;
    const badge = document.getElementById('missionBadge');
    sec.addEventListener('click', () => {
      if (badge.classList.contains('zero')) return;   // 미션 0건 → 펼침 동작 없음
      const open = card.hidden;
      card.hidden = !open;
      sec.classList.toggle('open', open);
      if (open) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  })();

  /* === Chat scroll to bottom on entering === */
  document.getElementById('enterChat').addEventListener('click', () => {
    requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; });
  });

  /* ============================================================
     Dashboard — 3D 테마 갤러리 통합 (iframe lazy 로드 · 테마 도트 · 보상 플로우)
     ============================================================ */
  const THEMES = [
    { id: 'museum', name: 'Slow Museum' },
    { id: 'planet', name: 'Bloom Planet' },
    { id: 'marble', name: 'Wellness Marble' },
  ];
  let activeTheme = 'museum';
  let missionsDone = 0;
  let execScore = 0;   // 솔루션 수행(이행)점수 — '했어요'마다 +2

  /* 시연자용 갤러리 리셋: museum iframe을 리로드해 보상 채우기 이전 초기 상태로 + 미션 카운터 0 */
  document.getElementById('galleryReset').addEventListener('click', () => {
    const f = document.querySelector('.museum-frame[data-theme="museum"]');
    if (f) { try { f.contentWindow.location.reload(); } catch (e) { f.src = f.src; } }
    missionsDone = 0;
    if (activeTheme !== 'museum') { activeTheme = 'museum'; applyActiveTheme(); updateThemeDots(); }
    showScreen('screen-dashboard');
  });

  // 수행점수 +2 → 대시보드 1×1 카드 점수 + 홈 새 솔루션 카드 % 동기화
  function bumpExecScore() {
    execScore = Math.min(100, execScore + 2);
    const dashCard = document.getElementById('dash-new-card');
    if (dashCard && !dashCard.classList.contains('scard-new')) {
      const s = dashCard.querySelector('.s-score');
      if (s) s.textContent = execScore;
    }
    const item = document.querySelector('.list-item[data-key="newplan"]');
    if (item) {
      const pct = item.querySelector('.li-pct'); if (pct) pct.textContent = execScore + '%';
      const bar = item.querySelector('.li-bar i'); if (bar) bar.style.width = execScore + '%';
    }
  }

  /* 갤러리 단독감상(focus) 진입/이탈 시 점수 카드 오버레이 숨김/복원
     — 작품 아래 캡션(작품명·획득경로·날짜)이 점수 카드에 가려지지 않도록.
     Slow Museum iframe이 window.parent.__museumSolo(true/false)로 호출. */
  window.__museumSolo = function (solo) {
    const sc = document.getElementById('score-cards');
    if (sc) sc.style.display = solo ? 'none' : '';
    const gr = document.getElementById('galleryReset');
    if (gr) gr.style.display = solo ? 'none' : '';
  };

  /* 각 테마 iframe에 주입: 배경 투명·컨트롤 패널/내부 점수카드 숨김·라운딩 제거(부모 .phone이 36px 클립) */
  const FRAME_INJECT_CSS = `
    html, body { background: transparent !important; }
    body { padding: 0 !important; margin: 0 !important; overflow: hidden !important; display: block !important; }
    main { padding: 0 !important; transform: none !important; display: block !important; }
    #sliders, .control-panel, #control-panel, #controls, aside, .sliders, .panel-right { display: none !important; }
    #cards, .cards, .score-cards, .card-row { display: none !important; }
    /* 콘텐츠를 프레임 좌상단에 고정 (중앙정렬로 밀리던 상단여백/오프셋 제거) */
    #canvas-wrap, .phone, .mobile-frame { position: absolute !important; top: 0 !important; left: 0 !important; margin: 0 !important; border-radius: 0 !important; box-shadow: none !important; }
    /* 테마 제목을 솔루션 화면 제목과 동일 위치로 (전환 시 흔들림 제거) + '소연님의' 줄바꿈 */
    #phone-title { top: 66px !important; left: 24px !important; }
    #phone-title .pt-eyebrow { display: block !important; }
  `;

  /* 모바일 상단 상태바 색(theme-color)을 현재 화면/테마 톤에 맞춰 갱신 → 상단 띠가 화면과 어우러짐 */
  const BAR_COLORS = { museum: '#c6c0b3', planet: '#d9e9e6', marble: '#fffbf7' };
  function setBarColor() {
    const onDash = document.getElementById('screen-dashboard').classList.contains('active');
    const c = onDash ? (BAR_COLORS[activeTheme] || '#eef5f1') : '#eef5f1';
    const m = document.querySelector('meta[name="theme-color"]');
    if (m) m.setAttribute('content', c);                 // 모바일 상태바 틴트
    if (!document.documentElement.classList.contains('embed')) document.body.style.background = c;  // contain 가장자리 여백 색(검정 바 방지)
  }
  function applyActiveTheme() {
    document.getElementById('phone').dataset.theme = activeTheme;   // 글래스 토큰 전환
    const loading = document.getElementById('museum-loading');
    document.querySelectorAll('.museum-frame').forEach(f => {
      const isActive = f.dataset.theme === activeTheme;
      f.classList.toggle('active', isActive);
      if (isActive) {
        if (!f.src && f.dataset.src) { if (loading) loading.hidden = false; f.src = f.dataset.src; }
        else if (loading) loading.hidden = true;
      }
    });
    setBarColor();
  }
  function updateThemeDots() {
    document.querySelectorAll('#theme-dots .theme-dot').forEach(d => {
      const on = d.dataset.theme === activeTheme;
      d.classList.toggle('active', on);
      d.setAttribute('aria-selected', on ? 'true' : 'false');
    });
  }
  function setupMuseumIframes() {
    document.querySelectorAll('.museum-frame').forEach(frame => {
      frame.addEventListener('load', () => {
        try {
          const doc = frame.contentDocument;
          if (doc && !doc.querySelector('style[data-injected]')) {
            const s = doc.createElement('style');
            s.setAttribute('data-injected', '1');
            s.textContent = FRAME_INJECT_CSS;
            doc.head.appendChild(s);
          }
        } catch (e) { /* same-origin local file */ }
        const loading = document.getElementById('museum-loading');
        if (loading && frame.classList.contains('active')) loading.hidden = true;
        // pause race 방지: 로딩 완료 시 대시보드가 아니면 즉시 일시정지
        if (!document.getElementById('screen-dashboard').classList.contains('active')) {
          try { frame.contentWindow.__pauseRender && frame.contentWindow.__pauseRender(); } catch (e) {}
        }
      });
    });
    applyActiveTheme();
  }

  /* 테마 도트 생성 */
  (function buildThemeDots() {
    const wrap = document.getElementById('theme-dots');
    if (!wrap) return;
    wrap.innerHTML = '';
    THEMES.forEach(t => {
      const dot = document.createElement('button');
      dot.className = 'theme-dot';
      dot.dataset.theme = t.id;
      dot.setAttribute('role', 'tab');
      dot.setAttribute('aria-label', t.name);
      dot.addEventListener('click', () => {
        if (activeTheme === t.id) return;
        activeTheme = t.id;
        applyActiveTheme();
        updateThemeDots();
      });
      wrap.appendChild(dot);
    });
    updateThemeDots();
  })();

  /* 미션 완료 → 갤러리에 보상 추가 + 대시보드로 전환
     1번째 → thrower(슬롯1), 2번째 → nike(슬롯0), 3번째 이후 → 그림 */
  function onNudgeDone(catIdx) {
    missionsDone += 1;
    bumpExecScore();          // 수행점수 +2
    const n = missionsDone;
    if (activeTheme !== 'museum') { activeTheme = 'museum'; applyActiveTheme(); updateThemeDots(); }
    // 먼저 대시보드로 전환(갤러리 노출) → 화면 전환 끝난 뒤 보상 추가.
    // 이렇게 해야 사용자가 갤러리를 보고 있는 상태에서 '잠깐 멈춤 → 등장'이 일관되게 보임
    // (전환 중에 등장이 진행돼 버려 지연이 안 느껴지던 문제 해결).
    showScreen('screen-dashboard');
    // 방금 '했어요' 누른 미션 → 작품 획득 경로 캡션으로 매칭 (짧은 행동 키워드)
    const doneNudge = NUDGES[catIdx];
    const rewardCaption = doneNudge ? (doneNudge.keyword || doneNudge.action) : '';
    const frame = document.querySelector('.museum-frame[data-theme="museum"]');
    const gallery = frame && frame.contentWindow && frame.contentWindow.gallery;
    if (gallery) {
      setTimeout(() => {
        // 미션 순서대로 지정된 보상 슬롯 채움 (도착 후 추가 → fade-in)
        if (n === 1) gallery.addSculpture(1, 'thrower', rewardCaption);   // 앞열 가운데 전시대
        else if (n === 2) gallery.addSculpture(0, 'nike', rewardCaption); // 앞열 왼쪽 전시대
        else if (n === 3) gallery.addPainting('groom', rewardCaption);    // 전면 초상화 (왼쪽 2번째)
        else if (n === 4) gallery.addPainting('rest', rewardCaption);     // 왼쪽 안쪽 풍경화
        else if (n === 5) gallery.addPainting('manage', rewardCaption);   // 오른쪽 안쪽 추상화
        else gallery.addPainting(undefined, rewardCaption);
      }, 600);   // 화면 전환(~0.3s) 후 도착 시점에 등장
    }
    // 완료한 미션은 다음 미션으로 교체하고, 카드는 펼쳐진 채로 둔다
    // → 실험실로 복귀하면 새 미션이 바로 펼쳐져 보임.
    nudgeIdx = (nudgeIdx + 1) % NUDGES.length;
    renderNudge();
    const mCard = document.getElementById('missionNudge');
    const mSec = document.getElementById('missionSec');
    if (mCard) mCard.hidden = false;
    if (mSec) mSec.classList.add('open');
  }

  /* 탭바: 대시보드 ↔ 실험실 */
  document.querySelectorAll('.tab[data-screen]').forEach(btn => {
    btn.addEventListener('click', () => showScreen(btn.dataset.screen));
  });

  /* 대시보드 NEW 카드 → 솔루션 만들기(챗) 진입 (이미 생성된 카드면 무시) */
  document.getElementById('dash-new-card')?.addEventListener('click', () => {
    const card = document.getElementById('dash-new-card');
    if (!card.classList.contains('scard-new')) return;   // 생성 완료된 솔루션 카드면 진입 안 함
    resetChat();
    showScreen('screen-chat');
  });

  /* 솔루션 생성 완료 → 대시보드 1×1 카드를 '생성된 솔루션' 카드로 교체.
     NEW 태그가 다른 카드처럼 하단좌측 정렬되도록 scard-new 클래스 제거(상단 고정 해제). */
  function updateDashNewCard() {
    const card = document.getElementById('dash-new-card');
    if (!card) return;
    card.classList.remove('scard-new');
    card.style.cursor = 'default';
    card.innerHTML =
      '<div class="s-title">' + (flow.totalLoss || 5) + 'kg 가벼워지기</div>' +
      '<span class="s-tag s-tag-new">NEW</span>' +
      '<div class="s-score">0</div>';
  }

  /* showScreen 래핑: 대시보드 진입 시 활성 iframe RAF 재개, 떠나면 일시정지 (lag 방지) */
  const _origShowScreen = showScreen;
  showScreen = function (id) {
    _origShowScreen(id);
    const active = document.querySelector('.museum-frame.active');
    const fn = (id === 'screen-dashboard') ? '__resumeRender' : '__pauseRender';
    try { active && active.contentWindow && active.contentWindow[fn] && active.contentWindow[fn](); } catch (e) {}
    setBarColor();
  };

  /* 초기화: 대시보드 시작 + 활성 테마 iframe 로드 */
  setupMuseumIframes();
  showScreen('screen-dashboard');

  /* 단독 실행(모바일): cover 방식 — 360×780 폰을 화면에 꽉 채우고(검정 레터박스 없음),
     넘치는 좌우 가장자리는 body overflow:hidden으로 클립. 임베드(피치 슬라이드)에서는 미적용. */
  if (!document.documentElement.classList.contains('embed')) {
    const _ph = document.getElementById('phone');
    // 너비 맞춤 + 좌상단 고정 + 상단 크롭.
    // 너비(innerWidth) 기준이라 하단 시스템바 토글(높이 변화)에도 재스케일/이동이 없어 안 흔들림.
    // 바가 떠도 콘텐츠는 그대로 있고 바만 위에 덮임 → 집어넣으면 그대로 복귀.
    const CROP_TOP = 36;     // 상단 상태바 영역만큼 디자인에서 잘라냄
    const CROP_BOTTOM = 43;  // 하단 시스템(내비) 바 영역만큼 디자인에서 잘라냄
    let _maxH = 0;
    _ph.style.position = 'fixed';
    _ph.style.left = '0';
    _ph.style.top = '0';
    _ph.style.transformOrigin = 'top left';
    const _fit = () => {
      // standalone: 브라우저가 viewport에서 시스템바 영역을 제외해 줌 → innerHeight=안전영역 높이.
      // 디자인에서도 상·하단을 잘라내고(남은 704px), 그 안전영역에 꽉 채움. 좌우 넘치는 만큼만 균등 클립.
      _maxH = Math.max(_maxH, window.innerHeight);
      const s = _maxH / (780 - CROP_TOP - CROP_BOTTOM);
      const tx = -(360 * s - window.innerWidth) / 2;
      _ph.style.transform = 'translate(' + tx + 'px, ' + (-CROP_TOP * s) + 'px) scale(' + s + ')';
    };
    window.addEventListener('resize', _fit);
    _fit();

    /* 숨은 제스처: 상단 가장자리 더블탭 → 새로고침 (시연용, 화면엔 안 보임).
       갤러리 iframe 위에서도 먹히도록 부모에 투명 히트존을 둠. */
    const _hit = document.createElement('div');
    _hit.style.cssText = 'position:fixed;left:64px;right:110px;top:0;height:64px;z-index:99999;background:transparent;';  // 좌측 64px는 채팅 뒤로가기, 우측 110px는 테마 도트용으로 비움
    let _lastTap = 0;
    _hit.addEventListener('pointerup', () => {
      const now = Date.now();
      if (now - _lastTap < 400) location.reload();
      _lastTap = now;
    });
    document.body.appendChild(_hit);
  }
</script>
</body>
</html>
