<script>
/* iframe(부모 대시보드)에 임베드되면 스스로 임베드 레이아웃 적용 — file:// 더블클릭에서도 동작 */
if (window.self !== window.top) {
  var s = document.createElement('style');
  s.textContent =
    "html,body{background:transparent!important;margin:0!important;padding:0!important;overflow:hidden!important;}"+
    "body{display:block!important;}"+
    "main{display:block!important;transform:none!important;padding:0!important;margin:0!important;}"+

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}
body {
  background: #DBE9DF;
  display: flex; flex-direction: column;
  min-height: 100vh;
  padding: 24px 32px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  line-height: 1.3;
}
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translateY(-20px);
}
#phone-title {
  position: absolute;
  top: 60px;
  left: 24px;
  z-index: 3;
  pointer-events: none;
}
#phone-title .pt-eyebrow {
  display: block;
  font-family: "Noto Sans KR", system-ui, sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #8aa0a8;
  letter-spacing: -0.2px;
  line-height: 1;
}
#phone-title .pt-name {
  display: block;
  font-family: "Roboto", "Noto Sans KR", system-ui, sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: #73CCA3;
  letter-spacing: -0.8px;
  line-height: 1;
  margin-top: 3px;
}
#canvas-wrap {
  width: 360px; height: 780px;
  background: #ffffff;
  border-radius: 40px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  touch-action: none;
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}
canvas { display:block; cursor:grab; touch-action: none; }
canvas:active { cursor:grabbing; }

#cards {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 268px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 16px 24px 28px;
  background: transparent;
  z-index: 2;
  pointer-events: none;
}
.card {
  background: #f4f8f5;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card .name { font-size: 13px; color: #666; font-weight: 600; }
.card .score { font-size: 26px; color: #73CCA3; font-weight: 700; line-height: 1.1; }

#reward-popup {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  background: rgba(255,255,255,0.97);
  border-radius: 24px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.28);
  padding: 42px 28px 32px;
  z-index: 5;
  text-align: center;
}
#reward-popup[hidden] { display: none; }
#reward-popup-close {
  position: absolute;
  top: 10px; right: 12px;
  width: 32px; height: 32px;
  border: none; background: transparent;
  font-size: 24px; line-height: 1; color: #aaa;
  cursor: pointer; border-radius: 50%;
}
#reward-popup-close:hover { background: #f0f0f0; color: #555; }
#reward-popup-text {
  font-size: 18px; font-weight: 400; color: #3a3a3a;
  line-height: 1.55; word-break: keep-all;
}
#reward-popup-text b { font-weight: 600; color: #73CCA3; }

#sliders {
  width: 360px;
  height: 780px;
  background: #ffffff;
  border-radius: 0 40px 40px 0;
  padding: 90px 28px 28px 56px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 24px;
  margin-left: -32px;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
#sliders h2 {
  font-size: 16px;
  color: #888;
  font-weight: 500;
  margin-top: 5px;
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}
.slider-row { display: flex; flex-direction: column; gap: 9px; }
.slider-row .label-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 15px; color: #73CCA3;
}
.slider-row .label { font-weight: 600; color: #73CCA3; }
.slider-row .value { font-variant-numeric: tabular-nums; color: #73CCA3; font-size: 14px; font-weight: 600; }
.slider-row input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 8px; border-radius: 4px;
  background: #e0e0e0; outline: none;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: #73CCA3; cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.slider-row input[type="range"]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%;
  background: #73CCA3; cursor: pointer; border: none;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

#submit-btn {
  margin-top: 2px;
  padding: 10px 32px;
  border-radius: 999px;
  background: #73CCA3;
  color: #ffffff;
  font-size: 16px;
  font-weight: 700;
  line-height: 1.2;
  border: none;
  cursor: pointer;
  align-self: center;
  box-shadow: 0 4px 12px rgba(115, 204, 163, 0.4);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  letter-spacing: 0.02em;
  font-family: inherit;
}
#submit-btn:hover { box-shadow: 0 6px 16px rgba(115, 204, 163, 0.5); }
#submit-btn:active { transform: scale(0.97); }

#triggers {
  margin-top: -2px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#triggers h3 {
  font-size: 16px;
  color: #888;
  font-weight: 500;
  letter-spacing: 0.02em;
}
#trigger-buttons {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
}
.trigger-btn {
  padding: 5px 14px;
  border-radius: 999px;
  background: transparent;
  color: #73CCA3;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.2;
  border: 1px solid #73CCA3;
  cursor: pointer;
  transition: background 0.1s ease;
  white-space: nowrap;
  font-family: inherit;
}
.trigger-btn:hover { background: rgba(115, 204, 163, 0.12); }
.trigger-row { display: flex; gap: 10px; align-items: center; }
.trigger-btn:active { transform: scale(0.97); }
</style>

<main>
<div id="canvas-wrap">
  <div id="phone-title"><span class="pt-eyebrow">소연님의</span><span class="pt-name">Bloom Planet</span></div>
  <canvas id="globe" width="360" height="780"></canvas>
  <div id="reward-popup" hidden>
    <button id="reward-popup-close" aria-label="닫기">&times;</button>
    <div id="reward-popup-text"></div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/meshoptimizer@0.20.0/meshopt_decoder.js"></script>
<script>
const W = 360, H = 780;
const canvas = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0xffffff, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.VSMShadowMap;

const scene = new THREE.Scene();
// 배경: 파스텔 민트~블루 "메시/블롭" 그라데이션 (연하고 은은하게).
// 큰 반투명 방사형 그라데이션 여러 개를 겹쳐 블러된 버블이 겹친 느낌.
// CSS가 아니라 WebGL 씬 배경이라 standalone·My Care Lab 임베드 양쪽에서 동일하게 보임.
scene.background = (() => {
  const W2 = 300, H2 = 650;               // 폰 프레임 비율(≈0.46) 근사
  const c = document.createElement('canvas');
  c.width = W2; c.height = H2;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#e8f4ef';              // 베이스 (아주 옅은 민트)
  ctx.fillRect(0, 0, W2, H2);
  // {x,y}=중심(0~1 비율), r=반경(가로폭 배수), rgb=색. 반투명→투명 방사로 부드럽게 겹침.
  const blobs = [
    { x: .18, y: .12, r: .75, rgb: '214,240,228' },  // 민트
    { x: .88, y: .28, r: .80, rgb: '207,230,245' },  // 스카이 블루
    { x: .30, y: .72, r: .85, rgb: '210,233,236' },  // 아쿠아
    { x: .82, y: .92, r: .75, rgb: '199,217,242' },  // 파스텔 블루
    { x: .55, y: .48, r: .60, rgb: '227,243,234' },  // 라이트 민트
  ];
  for (const b of blobs) {
    const cx = b.x * W2, cy = b.y * H2, rr = b.r * W2;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rr);
    g.addColorStop(0, `rgba(${b.rgb},0.85)`);
    g.addColorStop(1, `rgba(${b.rgb},0)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W2, H2);
  }
  return new THREE.CanvasTexture(c);
})();

const camera = new THREE.PerspectiveCamera(25, W/H, 0.1, 100);
const CAM_Z = 10;
const CAM_X = 0.35;     // 가로 오프셋(+ = 지구 왼쪽으로)
const CAM_Y = -0.1;     // 세로 오프셋(+ = 지구 아래로 / − = 위로)
const FULL_Z = 13;      // 허공 클릭 시 풀샷 줌(전체 지구 보이게, 중앙)
const Z_MIN = 3;     // 최대 확대
const Z_MAX = 10;    // 최대 축소
camera.position.set(CAM_X, CAM_Y, CAM_Z);

// 조명 — 모두 world 공간 고정. 균등한 base 광(ambient+hemi) + 약한 한 방향 sun.
// 양쪽 sun 없음 → terminator 음영 띠 안 생김. 어디서 봐도 균등.
const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);
const hemi = new THREE.HemisphereLight(0xffffff, 0x8a909a, 0.7);
scene.add(hemi);
// 약한 directional — 음영 살짝만 (입체감용) + 매우 은은한 그림자.
const sun = new THREE.DirectionalLight(0xfff4e0, 0.25);
sun.position.set(3, 4, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 20;
sun.shadow.camera.left = -2;
sun.shadow.camera.right = 2;
sun.shadow.camera.top = 2;
sun.shadow.camera.bottom = -2;
sun.shadow.bias = -0.0005;
sun.shadow.radius = 8;
sun.shadow.blurSamples = 16;
scene.add(sun);

// 모델 전용 보조광 — layer 1 (모델 메쉬만). 지구(layer 0)는 미수신 → 지구 조도·그림자 원본 그대로.
// directional 이라 자전 시 모델 표면 노멀이 이 고정 방향에 대해 바뀌며 명암이 동적으로 변함.
const modelSun = new THREE.DirectionalLight(0xffffff, 0.4);
modelSun.position.set(3, 4, 5);   // sun 과 동일 방향 → 음영 방향 일관
modelSun.layers.set(1);
scene.add(modelSun);
// 모델 전용 전방향 base 광 — directional 이 안 닿는 등진 면 컴컴함 해소. layer 1 (지구 무관).
const modelAmbient = new THREE.AmbientLight(0xffffff, 0.0);
modelAmbient.layers.set(1);
scene.add(modelAmbient);

// ─── 대륙 픽셀 맵 (지표면 색상 텍스처를 읽어 육상/해상 판정) ───
// 라임(대륙): G 우세  /  하늘색(바다): B 우세
let landPx = null;  // { data, w, h }
const landReady = new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    const cx = c.getContext('2d');
    cx.drawImage(img, 0, 0);
    landPx = {
      data: cx.getImageData(0, 0, c.width, c.height).data,
      w: c.width, h: c.height
    };
    resolve();
  };
  img.src = colorData;
});

function isLandUV(u, v) {
  if (!landPx) return false;
  const px = Math.floor(u * (landPx.w - 1));
  const py = Math.floor(v * (landPx.h - 1));
  const i = (py * landPx.w + px) * 4;
  const g = landPx.data[i + 1];
  const b = landPx.data[i + 2];
  return g > b + 15;  // 녹색이 파랑보다 확실히 크면 대륙
}

// UV → SphereGeometry 의 3D 방향. 기본 SphereGeometry 매핑:
//   x = -cos(phi)*sin(theta),  y = cos(theta),  z = sin(phi)*sin(theta)
//   theta = v*PI (북극→남극),  phi = u*2PI
function uvToDir(u, v) {
  const theta = v * Math.PI;
  const phi = u * 2 * Math.PI;
  return new THREE.Vector3(
    -Math.cos(phi) * Math.sin(theta),
     Math.cos(theta),
     Math.sin(phi) * Math.sin(theta)
  ).normalize();
}

// 3D 방향 → UV (uvToDir 역변환)
function dirToUV(p) {
  const v = Math.acos(Math.max(-1, Math.min(1, p.y))) / Math.PI;
  let phi = Math.atan2(p.z, -p.x);
  if (phi < 0) phi += 2 * Math.PI;
  return { u: phi / (2 * Math.PI), v };
}

// dir 주변 ringRad(rad) 링 위 samples 점이 전부 같은 타입이면 "넓은 외해/내륙".
// 좁은 바다(지중해·카리브) / 해안가는 주변에 다른 타입이 섞여 false → 거부됨.
function isOpenDir(dir, wantLand, ringRad, samples) {
  let t = new THREE.Vector3(0, 1, 0);
  if (Math.abs(dir.y) > 0.9) t.set(1, 0, 0);
  const b1 = new THREE.Vector3().crossVectors(dir, t).normalize();
  const b2 = new THREE.Vector3().crossVectors(dir, b1).normalize();
  const c = Math.cos(ringRad), s = Math.sin(ringRad);
  for (let i = 0; i < samples; i++) {
    const a = (i / samples) * 2 * Math.PI;
    const off = b1.clone().multiplyScalar(Math.cos(a))
      .add(b2.clone().multiplyScalar(Math.sin(a))).multiplyScalar(s);
    const p = dir.clone().multiplyScalar(c).add(off).normalize();
    const uv = dirToUV(p);
    if (isLandUV(uv.u, uv.v) !== wantLand) return false;
  }
  return true;
}

// 넓은 영역 우선 샘플 → 점차 완화. 바다는 ring 크게(태평양 등 외해 선호).
function pickTypedDir(wantLand) {
  const rings = wantLand ? [0.13, 0.07, 0] : [0.32, 0.22, 0.12, 0];
  for (const ring of rings) {
    for (let i = 0; i < 400; i++) {
      const u = Math.random();
      const v = Math.acos(2 * Math.random() - 1) / Math.PI;  // 극 오버샘플 방지
      if (isLandUV(u, v) !== wantLand) continue;
      const d = uvToDir(u, v);
      if (ring === 0 || isOpenDir(d, wantLand, ring, 8)) return d;
    }
  }
  return wantLand ? new THREE.Vector3(0, 0, 1) : new THREE.Vector3(1, 0, 0);
}

function pickRandomLandDir()  { return pickTypedDir(true); }
function pickRandomOceanDir() { return pickTypedDir(false); }

  if (o.isMesh) {
    o.castShadow = true;          // sun 그림자맵에 렌더 → 지구 표면에 부드러운 그림자
    o.layers.enable(1);           // 모델 전용 보조광(modelSun) 수신 — 지구는 layer0이라 무관
    if (o.material && o.material.isMeshStandardMaterial) {
      const mt = o.material;
      mt.metalness = 0;
      mt.roughness = 0.7;
      if (!mt.__brightened) {     // 머티리얼 공유 시 중복 곱셈 방지 (1회만)
        mt.color.multiplyScalar(1.45);              // baseColor tint 증폭 — 짙은 색 들어올림
        mt.emissive = new THREE.Color(0x1e1e1e);    // 균일 약발광 — 완전 검정부도 최소 밝기
        mt.emissiveIntensity = 1;
        mt.__brightened = true;
      }
      mt.needsUpdate = true;
    }
  }
}

// 골고루 분포 — Mitchell best-candidate: 후보를 여러 개 뽑아, 이미 배치된
// 것들 중 '가장 가까운 이웃'과의 거리가 최대인 후보를 선택 → 한 곳에 안 몰림.
// (지금 데모뿐 아니라 추후 실제 보상테이블/슬라이더 연동 시에도 동일 적용)
const _placedDirs = [];
function pickSpacedDir(ocean) {
  const pick = ocean ? pickRandomOceanDir : pickRandomLandDir;
  // 반환하는 객체를 그대로 _placedDirs 에 넣음 (clone 아님) → resetRewards 에서
  // wrapper.userData.placedDir 와 indexOf 로 정확히 찾아 제거 가능. 이후 mutate 안 함.
  if (_placedDirs.length === 0) { const d0 = pick(); _placedDirs.push(d0); return d0; }
  let best = null, bestNearestDot = Infinity;  // dot 작을수록 최근접 이웃과 멀리 떨어짐
  for (let i = 0; i < 16; i++) {
    const c = pick();
    let nearestDot = -Infinity;
    for (const p of _placedDirs) { const dt = c.dot(p); if (dt > nearestDot) nearestDot = dt; }
    if (nearestDot < bestNearestDot) { bestNearestDot = nearestDot; best = c; }
  }
  _placedDirs.push(best);
  return best;
}

const lionReady = new Promise((resolve, reject) => {
  gltfLoader.load('assets/models/glb_activity/lion_pbr.glb',
    gltf => resolve(gltf.scene),
    undefined,
    err => reject(err));
});

Promise.all([landReady, lionReady]).then(([_, lion]) => {
  // GLB 머티리얼 보정 + 그림자 캐스팅
  lion.traverse(o => {
    if (o.isMesh) o.castShadow = true;
    brightenMat(o);
  });

  // 모델 원점이 발이 아닐 수 있으므로 bounding box로 발 정렬
  const box = new THREE.Box3().setFromObject(lion);
  const center = new THREE.Vector3(); box.getCenter(center);
  lion.position.set(-center.x, -box.min.y, -center.z);

  const wrapper = new THREE.Group();
  wrapper.add(lion);
  wrapper.scale.setScalar(LION_SCALE);

  // 사자 기본 위치 = 아프리카 대륙 중앙 (적도 부근, 동경 ~20°)
  // 표준 equirectangular 매핑 기준: u = (lon+180)/360, v = (90-lat)/180
  const LION_LAT = 28;    // 위도 (도) — +north / -south
  const LION_LON = 1;     // 경도 (도) — +east / -west
  const lionU = (LION_LON + 180) / 360;
  const lionV = (90 - LION_LAT) / 180;
  const dir = uvToDir(lionU, lionV);
  _placedDirs.push(dir.clone());   // 추가 모델이 사자와 겹치지 않게 분산 기준에 등록
  wrapper.position.copy(dir).multiplyScalar(PLACEMENT_R);
  wrapper.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
  wrapper.rotateY(Math.PI);  // 자전 방향과 일치하도록 facing 180° 회전

  earth.add(wrapper);

  // 페이지 로드/리셋 시 초기 회전 = 프리뷰에서 잡은 구도(기울기).
  // 자전은 이 지점에서 시작하고, local Y축 자전이라 기울기는 유지됨.
  _earthQInitial.set(-0.176, -0.91204, 0.09611, -0.35774);
  _earthQ.copy(_earthQInitial);
  earth.quaternion.copy(_earthQ);

  // 페이지 로드 시 모든 보상 배치를 한 번에 배치 (사자 포함 총 11개).
  // 기존엔 '입력' 누를 때마다 4·3·3개씩 추가됐으나, 초기 상태로 전부 표시.
  REWARD_BATCHES.forEach(batch =>
    batch.forEach(r => placeReward(r.path, r.ocean, r.scaleMul ?? 1, r.tiltX ?? 0, r.floatR ?? 0, r.idle ?? false, r.fixed ?? null))
  );
  _rewardStep = REWARD_BATCHES.length;   // 이후 '입력' 누르면 리셋(루프)부터 동작
}).catch(err => console.error('사자 로드 실패:', err));

// ─── 추가 보상 모델 (대륙/바다 구분 + 넓은 영역 우선 배치) ───
// 사자와 동일 패턴으로 모델 1개 배치 (지구 자식 → 자전과 함께 이동)
function placeReward(path, ocean, scaleMul = 1, tiltX = 0, floatR = 0, idle = false, fixed = null) {
  const gen = _placementGen;
  gltfLoader.load(path, gltf => {
    if (gen !== _placementGen) return;   // 리셋 후 도착한 이전 사이클 로드 무시
    const m = gltf.scene;
    // castShadow 미설정 — 다수 모델 그림자맵 재렌더 GPU 과부하 방지
    m.traverse(brightenMat);
    const box = new THREE.Box3().setFromObject(m);
    const center = new THREE.Vector3(); box.getCenter(center);
    m.position.set(-center.x, -box.min.y, -center.z);  // 발을 원점에 정렬

    const wrapper = new THREE.Group();
    wrapper.add(m);
    wrapper.scale.setScalar(LION_SCALE * scaleMul);

    // fixed가 있으면 고정 lat/lon에 배치(사자와 동일), 없으면 골고루 분포 랜덤
    const dir = fixed
      ? uvToDir((fixed.lon + 180) / 360, (90 - fixed.lat) / 180)
      : pickSpacedDir(ocean);
    if (fixed) _placedDirs.push(dir.clone());   // 다른 모델이 안 겹치게 분산 기준 등록
    wrapper.position.copy(dir).multiplyScalar(PLACEMENT_R + floatR);  // floatR: 표면에서 띄움
    wrapper.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    wrapper.rotateY(Math.random() * Math.PI * 2);  // 법선축(=로컬 Y) 기준 랜덤 yaw — 모델들이 한 방향만 보지 않게
    if (tiltX) wrapper.rotateX(tiltX);   // 표면 접선축 기준 기울임 (다이버 = 엎드린 수영 자세)

    wrapper.userData.placedDir = dir;    // 리셋 시 _placedDirs 에서 정확히 제거하려고 보관
    if (idle) {                          // 'sway'=가오리·다이버 ±10° 왕복 / 'spin'=무지개 연속회전, 공통 hop
      wrapper.userData.idleMode = idle;
      wrapper.userData.baseQuat = wrapper.quaternion.clone();  // 정렬+yaw(+tilt) 적용된 기준 자세
      wrapper.userData.normal   = dir.clone();                 // 회전축 = hop 방향 = 표면 법선
      wrapper.userData.baseDist = PLACEMENT_R + floatR;
      wrapper.userData.phase    = Math.random() * Math.PI * 2; // 위상 분산
      _idleModels.push(wrapper);
    }
    earth.add(wrapper);
    _rewardWrappers.push(wrapper);
  }, undefined, err => console.error('보상 로드 실패:', path, err));
}

// 한글 주격조사: 끝 글자에 받침 있으면 '이', 없으면 '가' (비한글은 '가')
function subjectJosa(word) {
  const c = word.charCodeAt(word.length - 1);
  if (c >= 0xAC00 && c <= 0xD7A3) return ((c - 0xAC00) % 28 !== 0) ? '이' : '가';
  return '가';
}

function showRewardPopup(names) {
  const josa = subjectJosa(names[names.length - 1]);
  _popupText.innerHTML = '<b>' + names.join(', ') + '</b>' + josa + ' 지구에 도착했어요';
  _popup.hidden = false;
}

function disposeWrapper(w) {
  w.traverse(o => {
    if (!o.isMesh) return;
    if (o.geometry) o.geometry.dispose();
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    mats.forEach(m => {
      if (!m) return;
      for (const k in m) { const v = m[k]; if (v && v.isTexture) v.dispose(); }
      m.dispose();
    });
  });
}

function resetRewards() {
  _placementGen++;
  _rewardWrappers.forEach(w => {
    earth.remove(w);
    const d = w.userData.placedDir;
    if (d) { const i = _placedDirs.indexOf(d); if (i !== -1) _placedDirs.splice(i, 1); }
    disposeWrapper(w);
  });
  _rewardWrappers.length = 0;
  _idleModels.length = 0;
  _popup.hidden = true;
}

function advanceRewardDemo() {
  if (!_landReady) return;   // landPx 준비 전이면 무시 (보통 수 ms 내 준비)
  if (_rewardStep >= REWARD_BATCHES.length) {
    resetRewards();
    _rewardStep = 0;
    return;                  // 리셋엔 팝업 없음
  }
  const batch = REWARD_BATCHES[_rewardStep];
  batch.forEach(r => placeReward(r.path, r.ocean, r.scaleMul ?? 1, r.tiltX ?? 0, r.floatR ?? 0, r.idle ?? false, r.fixed ?? null));
  _rewardStep++;
  showRewardPopup(batch.map(r => r.name));
}

// ─── 인터랙션: 카메라 고정. 좌클릭/한손가락→지구 회전. 휠/핀치→줌. 우클릭·Shift+좌·두손가락→팬.
//      자전·사용자 회전 모두 earth 자체를 회전 → 조명은 항상 절대 위치 고정.
//      여백(지구 아닌 빈 공간) 단순 탭/클릭 → 풀샷 리셋 + 자전 재개.
const _earthQ = new THREE.Quaternion();
const _earthQInitial = new THREE.Quaternion();  // 페이지 로드 + reset 시 적용할 초기 회전
const _pointers = new Map();    // pointerId → {x, y}
let _isRot = false, _rotPrevX = 0, _rotPrevY = 0;
let _velX = 0, _velY = 0;        // 스와이프 관성 속도 (pixels per ms)
let _lastMoveT = 0;
const FRICTION = 0.94;           // 프레임당 감속 비율 (낮을수록 빠른 정지)
const VEL_STOP = 0.001;          // 정지 임계값
let _isPan = false, _panPrevX = 0, _panPrevY = 0;
let _isMulti = false;
let _multiStartDist = 0, _multiStartMidX = 0, _multiStartMidY = 0;
let _multiStartCamZ = 0, _multiStartViewOX = 0, _multiStartViewOY = 0;
let _downX = 0, _downY = 0, _downHitEarth = false;
let viewOX = 0, viewOY = 0;
let autoRotate = true;
const ROTATE_SENS = 0.006;
const TAP_THRESHOLD = 8;        // px — 이동량이 이보다 작으면 탭/클릭으로 간주

const _raycaster = new THREE.Raycaster();
const _ndc = new THREE.Vector2();
function isEarthHit(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  _ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  _ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  _raycaster.setFromCamera(_ndc, camera);
  return _raycaster.intersectObject(earth, false).length > 0;
}

// 지구 클릭 → 지금 셋팅한 '기본값' 구도로 복귀 (왼쪽위 오프셋 + 초기 회전)
function resetView() {
  camera.position.set(CAM_X, CAM_Y, CAM_Z);
  viewOX = 0; viewOY = 0;
  applyViewOffset();
  _earthQ.copy(_earthQInitial);  // 페이지 로드 시와 동일한 초기 회전으로 복귀
  earth.quaternion.copy(_earthQ);
  _velX = 0; _velY = 0;          // 관성 잔재 제거
  autoRotate = true;              // 자전 재개
}

// 허공 클릭 → 지구 전체가 보이는 풀샷 (중앙 정렬 + 줌아웃, 회전은 유지)
function fullShotView() {
  camera.position.set(0, 0, FULL_Z);
  viewOX = 0; viewOY = 0;
  applyViewOffset();
  _velX = 0; _velY = 0;
  autoRotate = true;
}

function applyViewOffset() {
  if (viewOX === 0 && viewOY === 0) camera.clearViewOffset();
  else camera.setViewOffset(W, H, viewOX, viewOY, W, H);
}

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  _pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  try { canvas.setPointerCapture(e.pointerId); } catch {}

  // 첫 포인터일 때만 탭 판정용 시작 위치·hit 기록
  if (_pointers.size === 1) {
    _downX = e.clientX; _downY = e.clientY;
    _downHitEarth = isEarthHit(e.clientX, e.clientY);
  }

  // 두 손가락(터치) 진입 → 핀치 줌 + 팬 모드 시작, 단일 모드 종료
  if (e.pointerType === 'touch' && _pointers.size === 2) {
    _isRot = false; _isPan = false; _isMulti = true;
    const arr = [..._pointers.values()];
    _multiStartDist  = Math.hypot(arr[0].x - arr[1].x, arr[0].y - arr[1].y) || 1;
    _multiStartMidX  = (arr[0].x + arr[1].x) / 2;
    _multiStartMidY  = (arr[0].y + arr[1].y) / 2;
    _multiStartCamZ  = camera.position.z;
    _multiStartViewOX = viewOX; _multiStartViewOY = viewOY;
    return;
  }

  if (_pointers.size > 1) return; // 두 손가락 모드 중 추가 입력 무시
  autoRotate = false;
  if (e.button === 2 || (e.button === 0 && e.shiftKey)) {
    _isPan = true;
    _panPrevX = e.clientX; _panPrevY = e.clientY;
    canvas.style.cursor = 'move';
  } else {  // button 0 (좌클릭) 또는 터치
    _isRot = true;
    _rotPrevX = e.clientX; _rotPrevY = e.clientY;
    _velX = 0; _velY = 0;
    _lastMoveT = performance.now();
    canvas.style.cursor = 'grabbing';
  }
});

window.addEventListener('pointermove', e => {
  if (_pointers.has(e.pointerId)) _pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (_isMulti && _pointers.size === 2) {
    const arr = [..._pointers.values()];
    const dist = Math.hypot(arr[0].x - arr[1].x, arr[0].y - arr[1].y) || 1;
    const midX = (arr[0].x + arr[1].x) / 2;
    const midY = (arr[0].y + arr[1].y) / 2;
    // 핀치 줌 — 거리 비율로 카메라 z 조정
    const zRaw = _multiStartCamZ * (_multiStartDist / dist);
    camera.position.z = Math.max(Z_MIN, Math.min(Z_MAX, zRaw));
    // 두 손가락 중심 이동 → viewOffset 팬
    viewOX = _multiStartViewOX - (midX - _multiStartMidX);
    viewOY = _multiStartViewOY - (midY - _multiStartMidY);
    applyViewOffset();
    return;
  }

  if (_isPan) {
    viewOX -= (e.clientX - _panPrevX);
    viewOY -= (e.clientY - _panPrevY);
    _panPrevX = e.clientX; _panPrevY = e.clientY;
    applyViewOffset();
  } else if (_isRot) {
    const dx = e.clientX - _rotPrevX;
    const dy = e.clientY - _rotPrevY;
    const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), dx * ROTATE_SENS);
    const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), dy * ROTATE_SENS);
    _earthQ.premultiply(qX).premultiply(qY);
    earth.quaternion.copy(_earthQ);
    _rotPrevX = e.clientX; _rotPrevY = e.clientY;

    // 관성용 속도 추적 — EMA(지수 이동 평균)로 jitter 평활화
    const now = performance.now();
    const dt = Math.max(now - _lastMoveT, 1);
    _velX = _velX * 0.7 + (dx / dt) * 0.3;
    _velY = _velY * 0.7 + (dy / dt) * 0.3;
    _lastMoveT = now;
  }
});

function endPointer(e) {
  _pointers.delete(e.pointerId);
  if (_pointers.size < 2) _isMulti = false;
  if (_pointers.size === 0) {
    _isRot = false; _isPan = false;
    canvas.style.cursor = 'grab';
    autoRotate = true;  // 어떤 조작 후에도 자전 재개 (현재 위치/줌 그대로)
    // 단순 탭/클릭: 지구 클릭 → 기본값 구도 / 허공 클릭 → 풀샷
    const dx = e.clientX - _downX;
    const dy = e.clientY - _downY;
    if (Math.hypot(dx, dy) < TAP_THRESHOLD) {
      if (_downHitEarth) resetView();   // 지구 클릭 → 기본값 복귀
      else fullShotView();              // 허공 클릭 → 풀샷
    }
  } else if (_pointers.size === 1 && !_isMulti) {
    // 두 손가락 → 한 손가락 으로 줄었을 때 회전 모드로 재시작
    const last = [..._pointers.values()][0];
    _isRot = true; _isPan = false;
    _rotPrevX = last.x; _rotPrevY = last.y;
  }
}
window.addEventListener('pointerup', endPointer);
window.addEventListener('pointercancel', endPointer);

// 휠 줌 (데스크탑)
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camera.position.z = Math.max(Z_MIN, Math.min(Z_MAX, camera.position.z + e.deltaY * 0.005));
}, { passive: false });

// ─── 애니메이션 ───
const _spinQ = new THREE.Quaternion();
const _yAxis = new THREE.Vector3(0, 1, 0);
let _paused = false;
window.__pauseRender = () => { _paused = true; };
window.__resumeRender = () => { if (_paused) { _paused = false; animate(); } };
function animate() {
  if (_paused) return;
  requestAnimationFrame(animate);

  // 자전 — 사용자 드래그 중이 아니면 항상 진행.
  // multiply(local 공간): 지구의 local Y(= 남북 자전축) 기준으로 돔.
  // 사용자가 지구를 기울여 놨어도 자전축은 지구 본인의 극을 통과.
  if (autoRotate && !_isRot) {
    _spinQ.setFromAxisAngle(_yAxis, 0.003);
    _earthQ.multiply(_spinQ);
  }

  // 스와이프 관성 — 마우스 놓은 직후 잔존 속도가 있으면 감속하며 자전에 더해짐
  if (!_isRot && (Math.abs(_velX) > VEL_STOP || Math.abs(_velY) > VEL_STOP)) {
    const frameMs = 16.67;
    const dx = _velX * frameMs;
    const dy = _velY * frameMs;
    const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), dx * ROTATE_SENS);
    const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), dy * ROTATE_SENS);
    _earthQ.premultiply(qX).premultiply(qY);
    _velX *= FRICTION;
    _velY *= FRICTION;
  } else if (!_isRot && (_velX !== 0 || _velY !== 0)) {
    _velX = 0; _velY = 0;  // 임계값 이하 잔재 제거
  }

  // idle: 'sway'=법선축 ±10° sin 왕복 / 'spin'=법선축 연속 360° 회전. 공통 위아래 hopping(ease)
  if (_idleModels.length) {
    const tt = performance.now() * 0.001;
    for (const w of _idleModels) {
      const u = w.userData;
      const ang = (u.idleMode === 'spin')
        ? tt * IDLE_SPIN_SPEED
        : IDLE_ROT_MAX * Math.sin(tt * IDLE_ROT_SPEED + u.phase);
      _idleQ.setFromAxisAngle(u.normal, ang);
      w.quaternion.copy(_idleQ).multiply(u.baseQuat);
      const lift = IDLE_HOP_AMP * (0.5 - 0.5 * Math.cos(tt * IDLE_HOP_SPEED + u.phase));
      w.position.copy(u.normal).multiplyScalar(u.baseDist + lift);
    }
  }

  earth.quaternion.copy(_earthQ);
  renderer.render(scene, camera);
}
animate();

// ─── (dev) 디버그용 외부 노출 ───
window.__debug = { camera, scene, earth, earthQ: _earthQ };

// 슬라이더 UI 제거됨 — My Care Lab 부모 페이지가 점수 관리.
const scores = { move: 72, rest: 60, groom: 48, manage: 80 };
window.__scores = scores;
</script>
<script>
/* ── 통합(WA_integration) 끼워진 모드 ──
   부모 통합 페이지가 ?embed=1 로 이 페이지를 iframe에 띄우면:
   · 자체 컨트롤 패널(#sliders)을 숨기고 폰 화면만 표시
   · 부모가 postMessage로 보내는 슬라이더/입력/트리거 값을
     기존 컨트롤(slider-*, submit-btn, .trigger-btn)에 그대로 주입
   기존 반응 로직은 손대지 않음 → 테마를 수정·배포하면 통합 화면에 자동 반영. */
(function () {
  if (new URLSearchParams(location.search).get('embed') !== '1') return;

  var css = document.createElement('style');
  css.textContent =
    'html,body{background:transparent !important;}' +
    'body{padding:0 !important;}' +
    'main{transform:none !important;}' +
    '#sliders{display:none !important;}' +
    '#canvas-wrap{box-shadow:none !important;border-radius:0 !important;background:transparent !important;transform:scale(1.012) !important;}';
  document.head.appendChild(css);

  function setSlider(key, value) {
    var s = document.getElementById('slider-' + key);
    if (!s) return;
    s.value = value;
    s.dispatchEvent(new Event('input', { bubbles: true }));
  }
  function clickTrigger(label) {
    var want = String(label).trim();
    var btns = document.querySelectorAll('.trigger-btn');
    for (var i = 0; i < btns.length; i++) {
      if (btns[i].textContent.trim() === want) { btns[i].click(); return; }
    }
  }

  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d || d.source !== 'wa-integration') return;
    if (d.type === 'slider') {
      setSlider(d.key, d.value);
    } else if (d.type === 'submit') {
      if (d.scores) {
        ['move', 'rest', 'groom', 'manage'].forEach(function (k) {
          if (d.scores[k] != null) setSlider(k, d.scores[k]);
        });
      }
      var btn = document.getElementById('submit-btn');
      if (btn) btn.click();
    } else if (d.type === 'trigger') {
      clickTrigger(d.label);
    }
  });

  function announce() {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ source: 'wa-theme', type: 'ready' }, '*');
    }
  }
  if (document.readyState === 'complete') announce();
  else window.addEventListener('load', announce);
})();
</script>
</body>
